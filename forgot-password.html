<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Forgot Password - InventoryOS</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:linear-gradient(135deg,#050505,#151515,#24103a);color:white;display:flex;align-items:center;justify-content:center;padding:20px}.card{width:100%;max-width:420px;background:#17171f;border:1px solid rgba(142,68,255,.35);border-radius:22px;padding:28px}.logo{text-align:center;font-size:30px;font-weight:bold}.logo span{color:#8e44ff}input,button{width:100%;padding:14px;border-radius:12px;font-size:16px}input{margin-top:18px;background:#24242e;color:white;border:1px solid rgba(142,68,255,.35)}button{margin-top:18px;border:0;background:#8e44ff;color:white;font-weight:bold}.message{text-align:center;margin-top:18px;color:#bbb}.back{display:block;text-align:center;margin-top:20px;color:#b56cff}</style></head><body><div class="card"><div class="logo">Inventory<span>OS</span></div><input id="email" type="email" placeholder="you@example.com"><button id="sendBtn" onclick="sendReset()">Send reset link</button><div id="message" class="message"></div><a class="back" href="login.html">Back to login</a></div><script src="js/api.js"></script><script>async function sendReset(){const email=document.getElementById("email").value.trim(),message=document.getElementById("message"),button=document.getElementById("sendBtn");if(!email){message.textContent="Please enter your email address.";return}button.disabled=true;button.textContent="Sending...";const data=await InventoryAPI.request("/auth/forgot-password",{method:"POST",body:JSON.stringify({email})});message.textContent=data.message||data.error||"If that email exists, a reset link has been sent.";button.disabled=false;button.textContent="Send reset link"}</script></body></html>
