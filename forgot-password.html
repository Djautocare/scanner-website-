<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password - InventoryOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1"> 

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#050505,#151515,#24103a);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#17171f;
    border:1px solid rgba(142,68,255,0.35);
    border-radius:22px;
    padding:28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
}

.logo{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-bottom:8px;
}

.logo span{color:#8e44ff;}

.subtitle{
    text-align:center;
    color:#bbb;
    margin-bottom:26px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#ddd;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(142,68,255,0.35);
    background:#24242e;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    margin-top:18px;
    padding:14px;
    border:0;
    border-radius:12px;
    background:#8e44ff;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.message{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    color:#bbb;
    min-height:22px;
}

.back{
    display:block;
    margin-top:20px;
    text-align:center;
    color:#b56cff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
    <div class="logo">Inventory<span>OS</span></div>
    <div class="subtitle">Reset access to your account</div>

    <label for="email">Email address</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="email">

    <button id="sendBtn" onclick="sendReset()">Send reset link</button>

    <div id="message" class="message"></div>

    <a class="back" href="login.html">Back to login</a>
</div>

<script>
const API_BASE = "https://api.inventoryos.co.uk";

async function sendReset(){
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message");
    const button = document.getElementById("sendBtn");

    if(!email){
        message.textContent = "Please enter your email address.";
        return;
    }

    button.disabled = true;
    button.textContent = "Sending...";
    message.textContent = "";

    try{
        const res = await fetch(`${API_BASE}/auth/forgot-password`, {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ email })
        });

        const data = await res.json();

        message.textContent = data.message || "If that email exists, a reset link has been sent.";

    }catch(error){
        message.textContent = "Something went wrong. Please try again.";
    }

    button.disabled = false;
    button.textContent = "Send reset link";
}
</script>

</body>
</html>
