<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Reprint Product Label</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
html{
    touch-action:manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(32,201,151,0.16), transparent 35%),
        radial-gradient(circle at top right, rgba(0,123,255,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:850px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg,#1d1d1d,#151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
button{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.search-button{
    background:linear-gradient(135deg,#20c997,#138f6d);
    border:1px solid rgba(32,201,151,0.45);
    box-shadow:0 10px 30px rgba(32,201,151,0.16);
}

.print-button{
    background:linear-gradient(135deg,#20c997,#138f6d);
    border:1px solid rgba(32,201,151,0.45);
}

.copy-button{
    background:linear-gradient(135deg,#0275d8,#025aa5);
    border:1px solid rgba(0,123,255,0.45);
}

.result-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:14px;
    margin-top:18px;
}

.result-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    text-align:left;
}

.result-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    margin-right:6px;
    margin-bottom:8px;
}

.barcode-badge{
    background:#0275d8;
}

.qty-badge{
    background:#6f42c1;
}

.location-box{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:10px;
    margin:10px 0;
    color:#ddd;
}

.empty-state{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:16px;
    text-align:center;
    color:#ddd;
    margin-top:18px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
}

#printArea{
    background:white;
    margin-top:20px;
    padding:5px;
    width:51mm;
    margin-left:auto;
    margin-right:auto;
    text-align:center;
    border-radius:6px;
}

#barcodeText{
    color:black;
    font-weight:bold;
    font-size:13px;
    margin:0;
    padding:0;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #20c997;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }
}

@media print{
    @page{
        size:51mm 25mm;
        margin:0;
    }

    html,
    body{
        width:51mm;
        height:25mm;
        margin:0;
        padding:0;
        background:white;
    }

    body *{
        visibility:hidden;
    }

    #printArea,
    #printArea *{
        visibility:visible;
    }

    #printArea{
        position:fixed;
        left:0;
        top:0;
        width:51mm;
        height:25mm;
        padding:1.5mm;
        margin:0;
        box-sizing:border-box;
        background:white;
        text-align:center;
        overflow:hidden;
        border-radius:0;
    }

    #barcode{
        width:48mm;
        height:17mm;
        display:block;
        margin:0 auto;
    }

    #barcodeText{
        color:black;
        font-size:11px;
        font-weight:bold;
        margin:0;
        padding:0;
        line-height:1;
    }

    #loadingOverlay{
        display:none !important;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Reprint Product Label</h1>
<p class="subtitle">Search for a product and reprint its barcode label</p>

<div class="form-card">

<div class="input-label">Product Search</div>
<input type="text" id="query" placeholder="Search description or barcode">

<button class="search-button" onclick="searchProduct()">Search Product</button>

</div>

<div id="results"></div>

<div id="printArea">
    <svg id="barcode"></svg>
    <p id="barcodeText"></p>
</div>

<a class="link-card" href="index.html">← Back to Dashboard</a>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function searchProduct(){
    const query = document.getElementById("query").value.trim();

    if(!query){
        alert("Enter product description or barcode");
        return;
    }

    document.getElementById("results").innerHTML = "";

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(!data.success || data.results.length === 0){
            document.getElementById("results").innerHTML =
            "<div class='empty-state'>No product found.</div>";
            return;
        }

        let html = "<div class='result-grid'>";

        data.results.forEach(item=>{

            let locationsHtml = "";

            if(item.locations && item.locations.length > 0){
                locationsHtml = "<div class='location-box'><strong>Locations:</strong><br>";

                item.locations.forEach(loc=>{
                    locationsHtml += `${loc.location} — Qty ${loc.qty}<br>`;
                });

                locationsHtml += "</div>";
            }else{
                locationsHtml =
                "<div class='location-box'>No stock locations found</div>";
            }

            html += `
                <div class="result-card">

                    <div class="result-title">${item.description}</div>

                    <div class="badge barcode-badge">
                        ${item.barcode}
                    </div>

                    <div class="badge qty-badge">
                        Qty ${item.totalQty}
                    </div>

                    ${locationsHtml}

                    <button class="print-button" onclick="printLabel('${item.barcode}')">
                        Print Label
                    </button>

                    <button class="copy-button" onclick="copyBarcode('${item.barcode}')">
                        Copy Barcode
                    </button>

                </div>
            `;
        });

        html += "</div>";

        document.getElementById("results").innerHTML = html;
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        document.getElementById("results").innerHTML =
        "<div class='empty-state'>Error searching product.</div>";
    });
}

function printLabel(barcode){
    document.getElementById("barcodeText").innerText = barcode;

    JsBarcode("#barcode", barcode, {
        format:"CODE128",
        displayValue:false,
        width:1.2,
        height:42,
        margin:0
    });

    window.print();
}

function copyBarcode(barcode){
    navigator.clipboard.writeText(barcode)
    .then(()=>{
        alert("Copied barcode: " + barcode);
    })
    .catch(()=>{
        alert("Could not copy barcode");
    });
}
</script>

</body>
</html>
