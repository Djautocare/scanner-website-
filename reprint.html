<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Reprint Product Label</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
html{
    touch-action:manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(32,201,151,0.16), transparent 35%),
        radial-gradient(circle at top right, rgba(0,123,255,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:900px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg,#1d1d1d,#151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
button{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.search-button,
.print-button{
    background:linear-gradient(135deg,#20c997,#138f6d);
    border:1px solid rgba(32,201,151,0.45);
    box-shadow:0 10px 30px rgba(32,201,151,0.16);
}

.copy-button{
    background:linear-gradient(135deg,#0275d8,#025aa5);
    border:1px solid rgba(0,123,255,0.45);
}

.range-button{
    background:linear-gradient(135deg,#6f42c1,#56329b);
    border:1px solid rgba(111,66,193,0.45);
}

.clear-button{
    background:linear-gradient(135deg,#333,#222);
    border:1px solid rgba(255,255,255,0.10);
}

.result-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:14px;
    margin-top:18px;
}

.result-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    text-align:left;
}

.result-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    margin-right:6px;
    margin-bottom:8px;
}

.barcode-badge{
    background:#0275d8;
}

.qty-badge{
    background:#6f42c1;
}

.location-box{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:10px;
    margin:10px 0;
    color:#ddd;
}

.empty-state{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:16px;
    text-align:center;
    color:#ddd;
    margin-top:18px;
}

.range-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:12px;
}

.range-preview{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:14px;
    padding:14px;
    color:#ddd;
    margin-top:10px;
    text-align:center;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
}

#printArea{
    background:white;
    margin-top:20px;
    padding:5px;
    width:51mm;
    margin-left:auto;
    margin-right:auto;
    text-align:center;
    border-radius:6px;
}

#printLabels{
    display:none;
}

.print-label{
    background:white;
    width:51mm;
    height:25mm;
    padding:1.5mm;
    box-sizing:border-box;
    text-align:center;
    overflow:hidden;
    page-break-after:always;
    break-after:page;
}

.print-label:last-child{
    page-break-after:auto;
    break-after:auto;
}

.print-label svg{
    width:48mm;
    height:17mm;
    display:block;
    margin:0 auto;
}

.label-text,
#barcodeText{
    color:black;
    font-weight:bold;
    font-size:11px;
    margin:0;
    padding:0;
    line-height:1;
    text-align:center;
}

#barcodeText{
    font-size:13px;
}

#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #20c997;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:700px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }

    .range-grid{
        grid-template-columns:1fr;
    }
}

@media print{
    @page{
        size:51mm 25mm;
        margin:0;
    }

    html,
    body{
        width:51mm !important;
        min-height:25mm !important;
        margin:0 !important;
        padding:0 !important;
        background:white !important;
        overflow:visible !important;
    }

    body *{
        display:none !important;
    }

    #printLabels,
    #printLabels *{
        display:block !important;
    }

    #printLabels{
        display:block !important;
        width:51mm !important;
        margin:0 !important;
        padding:0 !important;
        background:white !important;
    }

    .print-label{
        display:block !important;
        position:relative !important;
        width:51mm !important;
        height:25mm !important;
        padding:1.5mm !important;
        margin:0 !important;
        box-sizing:border-box !important;
        background:white !important;
        text-align:center !important;
        overflow:hidden !important;
        page-break-after:always !important;
        break-after:page !important;
    }

    .print-label:last-child{
        page-break-after:auto !important;
        break-after:auto !important;
    }

    .print-label svg{
        width:48mm !important;
        height:17mm !important;
        display:block !important;
        margin:0 auto !important;
    }

    .label-text{
        color:black !important;
        font-size:11px !important;
        font-weight:bold !important;
        margin:0 !important;
        padding:0 !important;
        line-height:1 !important;
        text-align:center !important;
    }

    #loadingOverlay{
        display:none !important;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Reprint Product Label</h1>
<p class="subtitle">Search for one label or print a whole barcode range</p>

<div class="form-card">

<div class="input-label">Single Product Search</div>
<input type="text" id="query" placeholder="Search description or barcode">

<button class="search-button" onclick="searchProduct()">Search Product</button>

</div>

<div id="results"></div>

<div class="form-card">

<div class="input-label">Bulk Barcode Range</div>

<div class="range-grid">
    <div>
        <div class="input-label">Prefix</div>
        <input type="text" id="rangePrefix" value="ITEM-" placeholder="ITEM-">
    </div>

    <div>
        <div class="input-label">Start Number</div>
        <input type="number" id="rangeStart" placeholder="33" min="1">
    </div>

    <div>
        <div class="input-label">End Number</div>
        <input type="number" id="rangeEnd" placeholder="60" min="1">
    </div>
</div>

<button class="range-button" onclick="generateRangeLabels()">Generate Range Labels</button>
<button class="print-button" onclick="printGeneratedLabels()">Print Generated Labels</button>
<button class="clear-button" onclick="clearGeneratedLabels()">Clear Generated Labels</button>

<div class="range-preview" id="rangePreview">
No range generated yet.
</div>

</div>

<a class="link-card" href="index.html">← Back to Dashboard</a>

</div>

</div>

<div id="printLabels"></div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let generatedLabelCount = 0;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function searchProduct(){
    const query = document.getElementById("query").value.trim();

    if(!query){
        alert("Enter product description or barcode");
        return;
    }

    document.getElementById("results").innerHTML = "";

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(!data.success || data.results.length === 0){
            document.getElementById("results").innerHTML =
            "<div class='empty-state'>No product found.</div>";
            return;
        }

        let html = "<div class='result-grid'>";

        data.results.forEach(item=>{

            let locationsHtml = "";

            if(item.locations && item.locations.length > 0){
                locationsHtml = "<div class='location-box'><strong>Locations:</strong><br>";

                item.locations.forEach(loc=>{
                    locationsHtml += `${loc.location} — Qty ${loc.qty}<br>`;
                });

                locationsHtml += "</div>";
            }else{
                locationsHtml =
                "<div class='location-box'>No stock locations found</div>";
            }

            html += `
                <div class="result-card">

                    <div class="result-title">${item.description}</div>

                    <div class="badge barcode-badge">
                        ${item.barcode}
                    </div>

                    <div class="badge qty-badge">
                        Qty ${item.totalQty}
                    </div>

                    ${locationsHtml}

                    <button class="print-button" onclick="printSingleLabel('${item.barcode}')">
                        Print Label
                    </button>

                    <button class="copy-button" onclick="copyBarcode('${item.barcode}')">
                        Copy Barcode
                    </button>

                </div>
            `;
        });

        html += "</div>";

        document.getElementById("results").innerHTML = html;
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        document.getElementById("results").innerHTML =
        "<div class='empty-state'>Error searching product.</div>";
    });
}

function createLabelHtml(barcode, index){
    return `
        <div class="print-label">
            <svg id="barcode_${index}"></svg>
            <p class="label-text">${barcode}</p>
        </div>
    `;
}

function renderBarcodes(barcodes){
    const container = document.getElementById("printLabels");

    let html = "";

    barcodes.forEach((barcode, index)=>{
        html += createLabelHtml(barcode, index);
    });

    container.innerHTML = html;

    barcodes.forEach((barcode, index)=>{
        JsBarcode("#barcode_" + index, barcode, {
            format:"CODE128",
            displayValue:false,
            width:1.2,
            height:42,
            margin:0
        });
    });

    generatedLabelCount = barcodes.length;
}

function printSingleLabel(barcode){
    renderBarcodes([barcode]);

    setTimeout(function(){
        window.print();
    }, 200);
}

function generateRangeLabels(){
    const prefix =
    document.getElementById("rangePrefix")
    .value
    .trim()
    .toUpperCase() || "ITEM-";

    const start =
    Number(document.getElementById("rangeStart").value);

    const end =
    Number(document.getElementById("rangeEnd").value);

    if(!start || !end){
        alert("Enter start and end numbers");
        return;
    }

    if(end < start){
        alert("End number must be higher than start number");
        return;
    }

    const total = end - start + 1;

    if(total > 200){
        alert("Maximum 200 labels at once");
        return;
    }

    let barcodes = [];

    for(let i = start; i <= end; i++){
        barcodes.push(prefix + i);
    }

    renderBarcodes(barcodes);

    document.getElementById("rangePreview").innerText =
    "Generated " +
    total +
    " labels: " +
    prefix +
    start +
    " to " +
    prefix +
    end;
}

function printGeneratedLabels(){
    if(generatedLabelCount <= 0){
        alert("Generate labels first");
        return;
    }

    setTimeout(function(){
        window.print();
    }, 200);
}

function clearGeneratedLabels(){
    document.getElementById("printLabels").innerHTML = "";
    document.getElementById("rangePreview").innerText =
    "No range generated yet.";
    generatedLabelCount = 0;
}

function copyBarcode(barcode){
    navigator.clipboard.writeText(barcode)
    .then(()=>{
        alert("Copied barcode: " + barcode);
    })
    .catch(()=>{
        alert("Could not copy barcode");
    });
}
</script>

</body>
</html>
