<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Scanner Search</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#0275d8;
}

.result-card{
    background:#2a2a2a;
    border-radius:10px;
    padding:15px;
    margin:15px 0;
    text-align:left;
}

.location{
    background:#111;
    padding:8px;
    border-radius:6px;
    margin-top:6px;
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}

#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<h1>Scanner Search</h1>

<input type="text" id="query" placeholder="Search description or barcode">

<button class="scan-button" onclick="startScanner()">Scan Barcode</button>

<div id="reader"></div>

<button onclick="searchStock()">Search</button>

<div id="results"></div>

<p style="margin-top:20px;">
<a href="index.html">← Back to Dashboard</a>
</p>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let scanner;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function startScanner(){

    const reader =
    document.getElementById("reader");

    reader.style.display = "block";

    reader.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    scanner =
    new Html5Qrcode("reader");

    scanner.start(
        {
            facingMode:"environment"
        },
        {
            fps:15,

            qrbox:{
                width:280,
                height:180
            },

            aspectRatio:1.777,

            formatsToSupport:[
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.CODE_39,
                Html5QrcodeSupportedFormats.CODE_93,
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E
            ]
        },

        function(decodedText){

            const barcode =
            decodedText
            .trim()
            .toUpperCase();

            document.getElementById("query")
            .value = barcode;

            document.getElementById("results")
            .innerHTML =
            "<p>Barcode scanned: " + barcode + "</p>";

            stopScanner();

            searchStock();

        },

        function(errorMessage){
            // ignore scan misses
        }
    )

    .catch(error=>{

        console.error(error);

        alert(
            "Could not start scanner. Make sure camera permissions are allowed."
        );

        scannerStarted = false;

    });

    scannerStarted = true;
}

function stopScanner(){

    if(scannerStarted && scanner){

        scanner.stop().then(()=>{

            scanner.clear();

            document.getElementById("reader")
            .style.display = "none";

            scannerStarted = false;

        }).catch(error=>{

            console.error(error);

            scannerStarted = false;

        });

    }

}

function searchStock(){

    const query =
    document.getElementById("query")
    .value
    .trim();

    if(!query){
        alert("Enter search term or scan barcode");
        return;
    }

    document.getElementById("results")
    .innerHTML = "";

    showLoading();

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })

    .then(res => res.json())

    .then(data => {

        hideLoading();

        if(!data.success){

            document.getElementById("results")
            .innerHTML =
            data.error || "Search failed";

            return;
        }

        if(data.results.length === 0){

            document.getElementById("results")
            .innerHTML =
            "<p>No results found.</p>";

            return;
        }

        let html = "";

        data.results.forEach(item => {

            html += `
                <div class="result-card">
                    <h3>${item.description}</h3>
                    <p><strong>Barcode:</strong> ${item.barcode}</p>
                    <p><strong>Total Qty:</strong> ${item.totalQty}</p>
                    <p><strong>Locations:</strong></p>
            `;

            if(item.locations.length === 0){

                html += `
                    <div class="location">
                    No stock currently available
                    </div>
                `;

            }else{

                item.locations.forEach(loc => {

                    html += `
                        <div class="location">
                        ${loc.location} — Qty: ${loc.qty}
                        </div>
                    `;

                });

            }

            html += `</div>`;
        });

        document.getElementById("results")
        .innerHTML = html;

    })

    .catch(error => {

        hideLoading();

        console.error(error);

        alert("Error searching stock");

    });

}
</script>

</body>
</html>
