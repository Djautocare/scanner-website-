<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Scanner Search</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#0275d8;
}

.stop-button{
    background:#d9534f;
}

.torch-button{
    background:#f0ad4e;
    color:black;
}

.choice-button{
    background:#333;
    text-align:left;
}

.result-card{
    background:#2a2a2a;
    border-radius:10px;
    padding:15px;
    margin:15px 0;
    text-align:left;
}

.location{
    background:#111;
    padding:8px;
    border-radius:6px;
    margin-top:6px;
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:10px;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}

#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<h1>Scanner Search</h1>

<input type="text" id="query" placeholder="Search keywords or scan barcode">

<button class="scan-button" onclick="startScanner()">Start Scanner</button>

<button class="torch-button" onclick="toggleTorch()">Toggle Flashlight</button>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<video id="reader" playsinline></video>

<button onclick="searchStock()">Search</button>

<div id="results"></div>

<p style="margin-top:20px;">
<a href="index.html">← Back to Dashboard</a>
</p>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let codeReader = null;
let controls = null;
let torchOn = false;
let searchResultsCache = [];

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function beep(){
    try{
        const audioCtx =
        new (window.AudioContext || window.webkitAudioContext)();

        const oscillator =
        audioCtx.createOscillator();

        const gain =
        audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 900;

        gain.gain.value = 0.15;

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();

        setTimeout(function(){
            oscillator.stop();
            audioCtx.close();
        }, 120);

    }catch(error){
        console.log("Beep not supported");
    }
}

function scanFeedback(){

    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    beep();

}

async function toggleTorch(){

    try{

        const video =
        document.getElementById("reader");

        if(!video.srcObject){
            alert("Start scanner first");
            return;
        }

        const track =
        video.srcObject.getVideoTracks()[0];

        torchOn = !torchOn;

        await track.applyConstraints({
            advanced:[{
                torch: torchOn
            }]
        });

        document.getElementById("results")
        .innerHTML =
        torchOn ? "<p>Flashlight on</p>" : "<p>Flashlight off</p>";

    }catch(error){

        alert("Flashlight not supported on this device/browser");

    }

}

function startScanner(){

    const video =
    document.getElementById("reader");

    video.style.display = "block";

    video.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    codeReader =
    new ZXingBrowser.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(
        null,
        "reader",
        function(result, error, ctrl){

            if(ctrl){
                controls = ctrl;
            }

            if(result){

                const barcode =
                result
                .getText()
                .trim()
                .toUpperCase();

                scanFeedback();

                document.getElementById("query")
                .value = barcode;

                document.getElementById("results")
                .innerHTML =
                "<p>Barcode scanned: " + barcode + "</p>";

                stopScanner();

                searchStock();

            }

        }
    )
    .then(function(ctrl){

        controls = ctrl;

    })
    .catch(function(error){

        console.error(error);

        alert("Could not start scanner. Check camera permissions.");

        scannerStarted = false;

        video.style.display = "none";

    });

    scannerStarted = true;
}

function stopScanner(){

    if(controls){

        controls.stop();

        controls = null;

    }

    const video =
    document.getElementById("reader");

    if(video && video.srcObject){

        video.srcObject
        .getTracks()
        .forEach(track => track.stop());

        video.srcObject = null;

    }

    video.style.display = "none";

    scannerStarted = false;
    torchOn = false;
}

function searchStock(){

    const query =
    document.getElementById("query")
    .value
    .trim();

    if(!query){
        alert("Enter keywords or scan barcode");
        return;
    }

    document.getElementById("results")
    .innerHTML = "";

    showLoading();

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })

    .then(res => res.json())

    .then(data => {

        hideLoading();

        if(!data.success){

            document.getElementById("results")
            .innerHTML =
            data.error || "Search failed";

            return;
        }

        if(data.results.length === 0){

            document.getElementById("results")
            .innerHTML =
            "<p>No results found.</p>";

            return;
        }

        searchResultsCache = data.results;

        showItemChoices(data.results);

    })

    .catch(error => {

        hideLoading();

        console.error(error);

        alert("Error searching stock");

    });

}

function showItemChoices(items){

    let html = "<h3>Choose item</h3>";

    items.forEach((item, index) => {

        html += `
            <button class="choice-button" onclick="showSelectedItem(${index})">
                ${item.description}
                <br>
                <small>Barcode: ${item.barcode}</small>
                <br>
                <small>Total Qty: ${item.totalQty}</small>
            </button>
        `;

    });

    document.getElementById("results").innerHTML = html;
}

function showSelectedItem(index){

    const item = searchResultsCache[index];

    let html = `
        <div class="result-card">
            <h3>${item.description}</h3>
            <p><strong>Barcode:</strong> ${item.barcode}</p>
            <p><strong>Total Qty:</strong> ${item.totalQty}</p>
            <p><strong>Locations:</strong></p>
    `;

    if(item.locations.length === 0){

        html += `
            <div class="location">
            No stock currently available
            </div>
        `;

    }else{

        item.locations.forEach(loc => {

            html += `
                <div class="location">
                ${loc.location} — Qty: ${loc.qty}
                </div>
            `;

        });

    }

    html += `
        </div>

        <button onclick="showItemChoices(searchResultsCache)">
            Back to results
        </button>
    `;

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
