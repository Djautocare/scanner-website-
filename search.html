<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Scanner Search</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
html{
    touch-action: manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,123,255,0.14), transparent 35%),
        radial-gradient(circle at top right, rgba(40,167,69,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:850px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg, #1d1d1d, #151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
select,
button,
textarea{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,
select,
textarea{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.button-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:12px 0;
}

.search-button{
    background:linear-gradient(135deg, #007bff, #0056b3);
    border:1px solid rgba(0,123,255,0.45);
    box-shadow:0 10px 30px rgba(0,123,255,0.16);
}

.scan-button{
    background:linear-gradient(135deg, #0275d8, #025aa5);
}

.stop-button{
    background:linear-gradient(135deg, #dc3545, #a92735);
}

.torch-button{
    background:linear-gradient(135deg, #ffc107, #d39e00);
    color:black;
}

.choice-button{
    background:linear-gradient(145deg, #242424, #191919);
    text-align:left;
    border:1px solid rgba(255,255,255,0.08);
    margin:8px 0;
}

.choice-button small{
    color:#bbb;
}

.quick-sale-button{
    background:linear-gradient(135deg, #dc3545, #a92735);
    border:1px solid rgba(220,53,69,0.45);
}

.location-sale-button{
    background:linear-gradient(135deg, #0275d8, #025aa5);
    width:100%;
    margin:10px 0 0 0;
}

.back-button{
    background:linear-gradient(135deg, #333, #222);
    border:1px solid rgba(255,255,255,0.10);
}

.result-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin:18px 0;
    text-align:left;
}

.result-header{
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
    margin-bottom:12px;
}

.result-title{
    font-size:22px;
    font-weight:bold;
    margin:0;
}

.badge{
    background:rgba(0,123,255,0.18);
    border:1px solid rgba(0,123,255,0.35);
    color:#66b2ff;
    padding:7px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    white-space:nowrap;
}

.info-row{
    background:#111;
    padding:10px;
    border-radius:10px;
    margin:8px 0;
    border:1px solid rgba(255,255,255,0.06);
}

.location{
    background:#111;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    border:1px solid rgba(255,255,255,0.06);
}

.location-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.10);
    overflow:hidden;
}

#results{
    margin-top:16px;
}

.links-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-top:16px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }

    .button-grid{
        grid-template-columns:1fr;
    }

    .result-header{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Scanner Search</h1>
<p class="subtitle">Search stock, check locations, and jump straight into a quick sale</p>

<div class="form-card">

<div class="input-label">Search or Barcode</div>
<input type="text" id="query" placeholder="Search keywords or scan barcode">

<div class="button-grid">
    <button class="scan-button" onclick="startScanner()">Start Scanner</button>
    <button class="torch-button" onclick="toggleTorch()">Toggle Flashlight</button>
</div>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<video id="reader" playsinline></video>

<button class="search-button" onclick="searchStock()">Search</button>

</div>

<div id="results"></div>

<div class="links-grid">
    <a class="link-card" href="index.html">← Back to Dashboard</a>
</div>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let codeReader = null;
let controls = null;
let torchOn = false;
let searchResultsCache = [];

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function beep(){
    try{
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 900;
        gain.gain.value = 0.15;

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();

        setTimeout(function(){
            oscillator.stop();
            audioCtx.close();
        }, 120);

    }catch(error){
        console.log("Beep not supported");
    }
}

function scanFeedback(){
    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    beep();
}

async function toggleTorch(){
    try{
        const video = document.getElementById("reader");

        if(!video.srcObject){
            alert("Start scanner first");
            return;
        }

        const track = video.srcObject.getVideoTracks()[0];

        torchOn = !torchOn;

        await track.applyConstraints({
            advanced:[{
                torch: torchOn
            }]
        });

        document.getElementById("results").innerHTML =
        torchOn ? "<div class='result-card'>Flashlight on</div>" : "<div class='result-card'>Flashlight off</div>";

    }catch(error){
        alert("Flashlight not supported on this device/browser");
    }
}

function startScanner(){
    const video = document.getElementById("reader");

    video.style.display = "block";

    video.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    codeReader = new ZXingBrowser.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(
        null,
        "reader",
        function(result, error, ctrl){

            if(ctrl){
                controls = ctrl;
            }

            if(result){
                const barcode = result
                .getText()
                .trim()
                .toUpperCase();

                scanFeedback();

                document.getElementById("query").value = barcode;

                document.getElementById("results").innerHTML =
                "<div class='result-card'>Barcode scanned: " + barcode + "</div>";

                stopScanner();

                searchStock();
            }
        }
    )
    .then(function(ctrl){
        controls = ctrl;
    })
    .catch(function(error){
        console.error(error);

        alert("Could not start scanner. Check camera permissions.");

        scannerStarted = false;

        video.style.display = "none";
    });

    scannerStarted = true;
}

function stopScanner(){
    if(controls){
        controls.stop();
        controls = null;
    }

    const video = document.getElementById("reader");

    if(video && video.srcObject){
        video.srcObject
        .getTracks()
        .forEach(track => track.stop());

        video.srcObject = null;
    }

    video.style.display = "none";

    scannerStarted = false;
    torchOn = false;
}

function searchStock(){
    const query = document.getElementById("query")
    .value
    .trim();

    if(!query){
        alert("Enter keywords or scan barcode");
        return;
    }

    document.getElementById("results").innerHTML = "";

    showLoading();

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })

    .then(res => res.json())

    .then(data => {
        hideLoading();

        if(!data.success){
            document.getElementById("results").innerHTML =
            "<div class='result-card'>" + (data.error || "Search failed") + "</div>";
            return;
        }

        if(data.results.length === 0){
            document.getElementById("results").innerHTML =
            "<div class='result-card'>No results found.</div>";
            return;
        }

        searchResultsCache = data.results;

        showItemChoices(data.results);
    })

    .catch(error => {
        hideLoading();

        console.error(error);

        alert("Error searching stock");
    });
}

function quickSale(barcode, location = ""){
    let url = "remove.html?barcode=" + encodeURIComponent(barcode);

    if(location){
        url += "&location=" + encodeURIComponent(location);
    }

    window.location.href = url;
}

function showItemChoices(items){
    let html = "<div class='result-card'><h3>Choose item</h3>";

    items.forEach((item, index) => {
        html += `
            <button class="choice-button" onclick="showSelectedItem(${index})">
                <strong>${item.description}</strong>
                <br>
                <small>Barcode: ${item.barcode}</small>
                <br>
                <small>Total Qty: ${item.totalQty}</small>
            </button>
        `;
    });

    html += "</div>";

    document.getElementById("results").innerHTML = html;
}

function showSelectedItem(index){
    const item = searchResultsCache[index];

    let html = `
        <div class="result-card">
            <div class="result-header">
                <h3 class="result-title">${item.description}</h3>
                <span class="badge">Qty ${item.totalQty}</span>
            </div>

            <div class="info-row"><strong>Barcode:</strong> ${item.barcode}</div>

            <button class="quick-sale-button" onclick="quickSale('${item.barcode}')">
                Quick Sale
            </button>

            <h3>Locations</h3>
    `;

    if(item.locations.length === 0){
        html += `
            <div class="location">
                No stock currently available
            </div>
        `;
    }else{
        item.locations.forEach(loc => {
            html += `
                <div class="location">
                    <div class="location-title">
                        <span>${loc.location}</span>
                        <span>Qty ${loc.qty}</span>
                    </div>

                    <button class="location-sale-button" onclick="quickSale('${item.barcode}', '${loc.location}')">
                        Quick Sale From ${loc.location}
                    </button>
                </div>
            `;
        });
    }

    html += `
        </div>

        <button class="back-button" onclick="showItemChoices(searchResultsCache)">
            Back to results
        </button>
    `;

    document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>
