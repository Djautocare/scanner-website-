<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Scanner Search</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html{
    touch-action: manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,123,255,0.14), transparent 35%),
        radial-gradient(circle at top right, rgba(40,167,69,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:850px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg, #1d1d1d, #151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
select,
button,
textarea{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,
select,
textarea{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.button-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:12px 0;
}

.search-button{
    background:linear-gradient(135deg, #007bff, #0056b3);
    border:1px solid rgba(0,123,255,0.45);
    box-shadow:0 10px 30px rgba(0,123,255,0.16);
}

.scan-button{
    background:linear-gradient(135deg, #0275d8, #025aa5);
}

.stop-button{
    background:linear-gradient(135deg, #dc3545, #a92735);
}

.torch-button{
    background:linear-gradient(135deg, #ffc107, #d39e00);
    color:black;
}

.choice-button{
    background:linear-gradient(145deg, #242424, #191919);
    text-align:left;
    border:1px solid rgba(255,255,255,0.08);
    margin:8px 0;
}

.choice-button small{
    color:#bbb;
}

.quick-sale-button{
    background:linear-gradient(135deg, #dc3545, #a92735);
    border:1px solid rgba(220,53,69,0.45);
}

.location-sale-button{
    background:linear-gradient(135deg, #0275d8, #025aa5);
    width:100%;
    margin:10px 0 0 0;
}

.back-button{
    background:linear-gradient(135deg, #333, #222);
    border:1px solid rgba(255,255,255,0.10);
}

.result-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin:18px 0;
    text-align:left;
}

.result-header{
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
    margin-bottom:12px;
}

.result-title{
    font-size:22px;
    font-weight:bold;
    margin:0;
}

.badge{
    background:rgba(0,123,255,0.18);
    border:1px solid rgba(0,123,255,0.35);
    color:#66b2ff;
    padding:7px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    white-space:nowrap;
}

.info-row{
    background:#111;
    padding:10px;
    border-radius:10px;
    margin:8px 0;
    border:1px solid rgba(255,255,255,0.06);
}

.location{
    background:#111;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    border:1px solid rgba(255,255,255,0.06);
}

.location-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

#scannerWrap{
    position:relative;
    max-width:380px;
    width:100%;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    overflow:hidden;
    box-shadow:0 12px 35px rgba(0,0,0,0.35);
}

#reader{
    width:100%;
    min-height:280px;
    background:#000;
}

.scan-overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        linear-gradient(to bottom,
            rgba(0,0,0,0.58) 0%,
            rgba(0,0,0,0.58) 31%,
            rgba(0,0,0,0.08) 31%,
            rgba(0,0,0,0.08) 69%,
            rgba(0,0,0,0.58) 69%,
            rgba(0,0,0,0.58) 100%);
}

.scan-box{
    width:86%;
    height:110px;
    border:3px solid #00e676;
    border-radius:16px;
    position:relative;
    box-shadow:0 0 28px rgba(0,230,118,0.50);
}

.scan-line{
    position:absolute;
    left:9%;
    right:9%;
    top:50%;
    height:3px;
    background:#ff3333;
    border-radius:999px;
    transform:translateY(-50%);
    box-shadow:0 0 16px rgba(255,51,51,0.85);
}

.scan-help{
    position:absolute;
    left:12px;
    right:12px;
    bottom:12px;
    text-align:center;
    font-size:13px;
    color:white;
    background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px;
    padding:8px 10px;
}

#results{
    margin-top:16px;
}

.links-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-top:16px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
}

.live-results{
    margin-top:10px;
}

.live-result-button{
    background:linear-gradient(145deg, #242424, #191919);
    text-align:left;
    border:1px solid rgba(0,123,255,0.24);
    margin:8px 0;
}

.selected-bundle-box{
    background:#111;
    border:1px solid rgba(40,167,69,0.28);
    border-radius:14px;
    padding:12px;
    margin:12px 0;
}

.selected-bundle-title{
    font-weight:bold;
    color:#7CFF9B;
    margin-bottom:8px;
}

.selected-bundle-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    background:#1d1d1d;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:10px;
    margin:8px 0;
}

.selected-bundle-item span{
    font-size:14px;
}

.remove-selected-button{
    width:auto;
    padding:8px 10px;
    margin:0;
    border-radius:10px;
    background:linear-gradient(135deg, #dc3545, #a92735);
    font-size:13px;
}

.clear-bundle-button{
    background:linear-gradient(135deg, #555, #333);
    border:1px solid rgba(255,255,255,0.10);
}

.helper-text{
    color:#aaa;
    font-size:13px;
    margin:4px 0 10px 0;
    line-height:1.35;
}

.box-group-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(40,167,69,0.24);
    border-radius:16px;
    padding:18px;
    margin:18px 0;
    text-align:left;
}

.box-group-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:bold;
    color:#7CFF9B;
    margin-bottom:12px;
}

.box-group-line{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:12px;
    margin:8px 0;
}

.box-group-line small{
    color:#bbb;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }

    .button-grid{
        grid-template-columns:1fr;
    }

    .result-header{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Scanner Search</h1>
<p class="subtitle">Search stock, check locations, and jump straight into a quick sale</p>

<div class="form-card">

<div class="input-label">Search or Barcode</div>
<input type="text" id="query" placeholder="Type to find items, then tap to add to bundle">
<p class="helper-text">Type a word, tap an item to add it to your selected bundle, then press Search or Enter to pull them through together.</p>
<div id="selectedBundleItems"></div>
<div id="liveResults" class="live-results"></div>

<div class="button-grid">
    <button class="scan-button" onclick="startScanner()">Start Scanner</button>
    <button class="torch-button" onclick="toggleTorch()">Toggle Flashlight</button>
</div>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<div id="scannerWrap">
    <div id="reader"></div>

    <div class="scan-overlay">
        <div class="scan-box">
            <div class="scan-line"></div>
        </div>
    </div>

    <div class="scan-help">Line the barcode across the red line</div>
</div>

<button class="search-button" onclick="searchStock()">Search</button>

</div>

<div id="results"></div>

<div class="links-grid">
    <a class="link-card" href="index.html">← Back to Dashboard</a>
</div>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Searching...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let html5QrCode = null;
let activeTrack = null;
let torchOn = false;
let searchResultsCache = [];
let selectedBundleItems = [];
let liveSearchTimer = null;
let latestLiveSearch = 0;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function escapeHtml(value){
    return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function escapeJs(value){
    return String(value || "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "\\\"");
}

function normaliseBarcodeShortcut(value){
    const text = String(value || "").trim().toUpperCase();

    if(!text){
        return "";
    }

    if(/^ITEM-\d+$/.test(text)){
        return text;
    }

    if(/^\d+$/.test(text)){
        return "ITEM-" + text;
    }

    return text;
}

function beep(){
    try{
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 900;
        gain.gain.value = 0.15;

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();

        setTimeout(function(){
            oscillator.stop();
            audioCtx.close();
        }, 120);

    }catch(error){
        console.log("Beep not supported");
    }
}

function scanFeedback(){
    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    beep();
}

async function toggleTorch(){
    try{
        if(!activeTrack){
            alert("Start scanner first");
            return;
        }

        torchOn = !torchOn;

        await activeTrack.applyConstraints({
            advanced:[{
                torch: torchOn
            }]
        });

        document.getElementById("results").innerHTML =
        torchOn ? "<div class='result-card'>Flashlight on</div>" : "<div class='result-card'>Flashlight off</div>";

    }catch(error){
        torchOn = false;
        alert("Flashlight not supported on this device/browser");
    }
}

function startScanner(){
    const scannerWrap = document.getElementById("scannerWrap");

    scannerWrap.style.display = "block";

    scannerWrap.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 14,
        qrbox: function(viewfinderWidth, viewfinderHeight){
            const width = Math.floor(Math.min(viewfinderWidth * 0.86, 320));
            const height = Math.floor(Math.min(viewfinderHeight * 0.34, 120));
            return {
                width: width,
                height: height
            };
        },
        aspectRatio: 1.333,
        disableFlip: true,
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
    };

    html5QrCode.start(
        {
            facingMode: "environment"
        },
        config,
        function(decodedText){
            const barcode = normaliseBarcodeShortcut(decodedText);

            scanFeedback();

            document.getElementById("query").value = barcode;

            document.getElementById("results").innerHTML =
            "<div class='result-card'>Barcode scanned: " + escapeHtml(barcode) + "</div>";

            stopScanner();
            searchStock();
        },
        function(errorMessage){
            // Ignore scan misses while camera is running.
        }
    )
    .then(function(){
        scannerStarted = true;

        setTimeout(function(){
            const video = document.querySelector("#reader video");

            if(video && video.srcObject){
                activeTrack = video.srcObject.getVideoTracks()[0] || null;

                if(activeTrack){
                    activeTrack.applyConstraints({
                        advanced:[
                            { focusMode:"continuous" },
                            { exposureMode:"continuous" }
                        ]
                    }).catch(function(){
                        // Some phones/browsers do not allow focus constraints.
                    });
                }
            }
        }, 500);
    })
    .catch(function(error){
        console.error(error);
        alert("Could not start scanner. Check camera permissions.");
        scannerStarted = false;
        activeTrack = null;
        scannerWrap.style.display = "none";
    });
}

function stopScanner(){
    const scannerWrap = document.getElementById("scannerWrap");

    if(html5QrCode && scannerStarted){
        html5QrCode.stop()
        .then(function(){
            return html5QrCode.clear();
        })
        .catch(function(error){
            console.error(error);
        });
    }

    scannerWrap.style.display = "none";
    scannerStarted = false;
    activeTrack = null;
    torchOn = false;
}

function runSearch(query, options = {}){
    const showLoader = options.showLoader === true;

    if(showLoader){
        showLoading();
    }

    return fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })
    .then(res => res.json())
    .finally(() => {
        if(showLoader){
            hideLoading();
        }
    });
}

function setupAutoSearch(){
    const input = document.getElementById("query");

    input.addEventListener("input", function(){
        clearTimeout(liveSearchTimer);
        let query = input.value.trim();
        const liveQuery = normaliseBarcodeShortcut(query);

        if(!query){
            document.getElementById("liveResults").innerHTML = "";
            return;
        }

        liveSearchTimer = setTimeout(function(){
            liveSearch(liveQuery);
        }, 300);
    });

    input.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            searchStock();
        }
    });
}

function liveSearch(query){
    const searchNumber = Date.now();
    latestLiveSearch = searchNumber;

    document.getElementById("liveResults").innerHTML =
    "<div class='result-card'>Finding matches...</div>";

    runSearch(query)
    .then(data => {
        if(searchNumber !== latestLiveSearch){
            return;
        }

        if(!data.success){
            document.getElementById("liveResults").innerHTML = "";
            return;
        }

        renderLiveResults(data.results || []);
    })
    .catch(error => {
        console.error(error);
        document.getElementById("liveResults").innerHTML = "";
    });
}

function renderLiveResults(items){
    if(items.length === 0){
        document.getElementById("liveResults").innerHTML =
        "<div class='result-card'>No live matches found.</div>";
        return;
    }

    let html = "<div class='result-card'><h3>Tap to add to bundle</h3>";

    items.forEach((item, index) => {
        const alreadySelected = selectedBundleItems.some(selected => selected.barcode === item.barcode);

        html += `
            <button class="live-result-button" onclick="addBundleItemFromLive(${index})">
                <strong>${escapeHtml(item.description)}</strong>
                <br>
                <small>Barcode: ${escapeHtml(item.barcode)}</small>
                <br>
                <small>Total Qty: ${escapeHtml(item.totalQty)}</small>
                ${alreadySelected ? "<br><small>Already selected</small>" : ""}
            </button>
        `;
    });

    html += "</div>";

    searchResultsCache = items;
    document.getElementById("liveResults").innerHTML = html;
}

function addBundleItemFromLive(index){
    const item = searchResultsCache[index];

    if(!item){
        return;
    }

    if(!selectedBundleItems.some(selected => selected.barcode === item.barcode)){
        selectedBundleItems.push(item);
    }

    document.getElementById("query").value = "";
    document.getElementById("liveResults").innerHTML = "";
    renderSelectedBundleItems();
}

function renderSelectedBundleItems(){
    const box = document.getElementById("selectedBundleItems");

    if(selectedBundleItems.length === 0){
        box.innerHTML = "";
        return;
    }

    let html = `
        <div class="selected-bundle-box">
            <div class="selected-bundle-title">Selected bundle items (${selectedBundleItems.length})</div>
    `;

    selectedBundleItems.forEach((item, index) => {
        html += `
            <div class="selected-bundle-item">
                <span>${escapeHtml(item.description)}<br><small>${escapeHtml(item.barcode)}</small></span>
                <button class="remove-selected-button" onclick="removeBundleItem(${index})">Remove</button>
            </div>
        `;
    });

    html += `
            <button class="clear-bundle-button" onclick="clearBundleItems()">Clear selected items</button>
        </div>
    `;

    box.innerHTML = html;
}

function removeBundleItem(index){
    selectedBundleItems.splice(index, 1);
    renderSelectedBundleItems();
}

function clearBundleItems(){
    selectedBundleItems = [];
    renderSelectedBundleItems();
    document.getElementById("results").innerHTML = "";
}

function searchStock(){
    let query = document.getElementById("query").value.trim();
    query = normaliseBarcodeShortcut(query);
    document.getElementById("query").value = query;

    document.getElementById("liveResults").innerHTML = "";

    if(selectedBundleItems.length > 0){
        showBundleResults();
        return;
    }

    if(!query){
        alert("Enter keywords, scan barcode, or select bundle items first");
        return;
    }

    document.getElementById("results").innerHTML = "";

    runSearch(query, {showLoader:true})
    .then(data => {
        if(!data.success){
            document.getElementById("results").innerHTML =
            "<div class='result-card'>" + escapeHtml(data.error || "Search failed") + "</div>";
            return;
        }

        if(data.results.length === 0){
            document.getElementById("results").innerHTML =
            "<div class='result-card'>No results found.</div>";
            return;
        }

        searchResultsCache = data.results;
        showItemChoices(data.results);
    })
    .catch(error => {
        console.error(error);
        alert("Error searching stock");
    });
}

function quickSale(barcode, location = ""){
    let url = "remove.html?barcode=" + encodeURIComponent(barcode);

    if(location){
        url += "&location=" + encodeURIComponent(location);
    }

    window.location.href = url;
}

function showItemChoices(items){
    let html = "<div class='result-card'><h3>Choose item</h3>";

    items.forEach((item, index) => {
        html += `
            <button class="choice-button" onclick="showSelectedItem(${index})">
                <strong>${escapeHtml(item.description)}</strong>
                <br>
                <small>Barcode: ${escapeHtml(item.barcode)}</small>
                <br>
                <small>Total Qty: ${escapeHtml(item.totalQty)}</small>
            </button>
        `;
    });

    html += "</div>";
    document.getElementById("results").innerHTML = html;
}

function showBundleResults(){
    const groupedByBox = {};
    const noLocationItems = [];

    selectedBundleItems.forEach((item, index) => {
        if(!item.locations || item.locations.length === 0){
            noLocationItems.push({item:item, index:index});
            return;
        }

        item.locations.forEach(loc => {
            const boxName = loc.location || "Unknown Box";

            if(!groupedByBox[boxName]){
                groupedByBox[boxName] = [];
            }

            groupedByBox[boxName].push({
                item:item,
                index:index,
                location:boxName,
                qty:loc.qty
            });
        });
    });

    const boxNames = Object.keys(groupedByBox).sort((a, b) => {
        const numA = Number(String(a).match(/\d+/)?.[0] || 0);
        const numB = Number(String(b).match(/\d+/)?.[0] || 0);

        if(numA && numB && numA !== numB){
            return numA - numB;
        }

        return String(a).localeCompare(String(b), undefined, {numeric:true});
    });

    let html = `
        <div class="result-card">
            <h3>Bundle items grouped by box</h3>
            <p class="helper-text">Pick from the boxes shown below. Each line shows the barcode, item name, and the quick sale button for that exact box.</p>
        </div>
    `;

    boxNames.forEach(boxName => {
        const entries = groupedByBox[boxName];

        html += `
            <div class="box-group-card">
                <div class="box-group-title">
                    <span>${escapeHtml(boxName)}</span>
                    <span class="badge">${entries.length} item${entries.length === 1 ? "" : "s"}</span>
                </div>
        `;

        entries.forEach(entry => {
            html += `
                <div class="box-group-line">
                    <strong>${escapeHtml(entry.item.barcode)}</strong> — ${escapeHtml(entry.item.description)}
                    <br>
                    <small>Qty in this box: ${escapeHtml(entry.qty)}</small>
                    <button class="location-sale-button" onclick="quickSale('${escapeJs(entry.item.barcode)}', '${escapeJs(entry.location)}')">
                        Quick Sale From ${escapeHtml(entry.location)}
                    </button>
                </div>
            `;
        });

        html += `</div>`;
    });

    if(noLocationItems.length > 0){
        html += `
            <div class="box-group-card">
                <div class="box-group-title">
                    <span>No stock location found</span>
                    <span class="badge">${noLocationItems.length}</span>
                </div>
        `;

        noLocationItems.forEach(entry => {
            html += `
                <div class="box-group-line">
                    <strong>${escapeHtml(entry.item.barcode)}</strong> — ${escapeHtml(entry.item.description)}
                    <br>
                    <small>No stock currently available.</small>
                    <button class="remove-selected-button" onclick="removeBundleItem(${entry.index}); showBundleResults();">
                        Remove from bundle
                    </button>
                </div>
            `;
        });

        html += `</div>`;
    }

    html += `
        <button class="back-button" onclick="renderSelectedBundleItems(); document.getElementById('results').innerHTML = '';">
            Back to selected bundle list
        </button>
    `;

    document.getElementById("results").innerHTML = html;
}

function buildItemCard(item, index, bundleMode = false){
    let html = `
        <div class="result-card">
            <div class="result-header">
                <h3 class="result-title">${escapeHtml(item.description)}</h3>
                <span class="badge">Qty ${escapeHtml(item.totalQty)}</span>
            </div>

            <div class="info-row"><strong>Barcode:</strong> ${escapeHtml(item.barcode)}</div>

            <button class="quick-sale-button" onclick="quickSale('${escapeJs(item.barcode)}')">
                Quick Sale
            </button>

            <h3>Locations</h3>
    `;

    if(!item.locations || item.locations.length === 0){
        html += `
            <div class="location">
                No stock currently available
            </div>
        `;
    }else{
        item.locations.forEach(loc => {
            html += `
                <div class="location">
                    <div class="location-title">
                        <span>${escapeHtml(loc.location)}</span>
                        <span>Qty ${escapeHtml(loc.qty)}</span>
                    </div>

                    <button class="location-sale-button" onclick="quickSale('${escapeJs(item.barcode)}', '${escapeJs(loc.location)}')">
                        Quick Sale From ${escapeHtml(loc.location)}
                    </button>
                </div>
            `;
        });
    }

    if(bundleMode){
        html += `
            <button class="remove-selected-button" onclick="removeBundleItem(${index}); showBundleResults();">
                Remove from bundle
            </button>
        `;
    }

    html += `</div>`;
    return html;
}

function showSelectedItem(index){
    const item = searchResultsCache[index];
    let html = buildItemCard(item, index, false);

    html += `
        <button class="back-button" onclick="showItemChoices(searchResultsCache)">
            Back to results
        </button>
    `;

    document.getElementById("results").innerHTML = html;
}

setupAutoSearch();
</script>

</body>
</html>
