<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Mystery Boxes</title>

<style>
html{
    touch-action:manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(156,39,176,0.16), transparent 35%),
        radial-gradient(circle at top right, rgba(255,193,7,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:950px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg,#1d1d1d,#151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:18px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
button,
textarea{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,
textarea{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

textarea{
    min-height:80px;
    resize:vertical;
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.create-button{
    background:linear-gradient(135deg,#9c27b0,#6f1a80);
    border:1px solid rgba(156,39,176,0.45);
    box-shadow:0 10px 30px rgba(156,39,176,0.18);
}

.refresh-button{
    background:linear-gradient(135deg,#ffc107,#d39e00);
    color:black;
    border:1px solid rgba(255,193,7,0.45);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:14px;
    margin-top:18px;
}

.mb-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    text-align:left;
}

.mb-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:12px;
}

.mb-id{
    background:rgba(156,39,176,0.22);
    color:#e58cff;
    border:1px solid rgba(156,39,176,0.38);
    padding:7px 10px;
    border-radius:999px;
    font-weight:bold;
    font-size:13px;
    white-space:nowrap;
}

.mb-name{
    font-size:20px;
    font-weight:bold;
}

.info-box{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:10px;
    margin-top:8px;
    color:#ddd;
    line-height:1.35;
}

.cost{
    color:#00e676;
    font-weight:bold;
}

.status{
    display:inline-block;
    margin-top:10px;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(40,167,69,0.20);
    color:#54d86f;
    border:1px solid rgba(40,167,69,0.35);
    font-size:13px;
    font-weight:bold;
}

.empty-state{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:16px;
    text-align:center;
    color:#ddd;
    margin-top:18px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
}

#result{
    text-align:center;
    font-weight:bold;
    margin-top:10px;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #9c27b0;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }

    .mb-header{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Mystery Boxes</h1>
<p class="subtitle">Create purchase boxes with auto IDs like MB-1, MB-2 and track their cost</p>

<div class="form-card">

<div class="input-label">Mystery Box Name</div>
<input type="text" id="mbName" placeholder="Example: Tech Box June">

<div class="input-label">Cost</div>
<input type="number" id="mbCost" placeholder="Cost £" step="0.01" min="0">

<div class="input-label">Notes</div>
<textarea id="mbNotes" placeholder="Example: Mixed tech, clothes, DIY items"></textarea>

<button class="create-button" onclick="createMysteryBox()">Create Mystery Box</button>

</div>

<button class="refresh-button" onclick="loadMysteryBoxes()">Refresh Mystery Boxes</button>

<div id="result"></div>

<div id="mysteryBoxList">
    <div class="empty-state">Loading mystery boxes...</div>
</div>

<a class="link-card" href="index.html">← Back to Dashboard</a>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function money(value){
    return "£" + Number(value || 0).toFixed(2);
}

function createMysteryBox(){
    const name = document.getElementById("mbName").value.trim();
    const cost = document.getElementById("mbCost").value;
    const notes = document.getElementById("mbNotes").value.trim();

    if(!name){
        alert("Enter a mystery box name");
        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"CREATE_MYSTERY_BOX",
            name:name,
            cost:cost,
            notes:notes
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(!data.success){
            document.getElementById("result").innerText =
            data.error || "Could not create mystery box";
            return;
        }

        document.getElementById("result").innerText =
        "Created " + data.mysteryBoxId + " - " + data.name;

        document.getElementById("mbName").value = "";
        document.getElementById("mbCost").value = "";
        document.getElementById("mbNotes").value = "";

        loadMysteryBoxes();
    })

    .catch(error=>{
        hideLoading();
        console.error(error);
        document.getElementById("result").innerText =
        "Error creating mystery box";
    });
}

function loadMysteryBoxes(){
    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"GET_MYSTERY_BOXES"
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(!data.success){
            document.getElementById("mysteryBoxList").innerHTML =
            "<div class='empty-state'>" + (data.error || "Could not load mystery boxes") + "</div>";
            return;
        }

        if(data.mysteryBoxes.length === 0){
            document.getElementById("mysteryBoxList").innerHTML =
            "<div class='empty-state'>No mystery boxes created yet.</div>";
            return;
        }

        let html = "<div class='grid'>";

        data.mysteryBoxes.slice().reverse().forEach(box=>{
            html += `
                <div class="mb-card">

                    <div class="mb-header">
                        <div>
                            <div class="mb-name">${box.name}</div>
                            <div class="status">${box.status || "Active"}</div>
                        </div>

                        <div class="mb-id">${box.mysteryBoxId}</div>
                    </div>

                    <div class="info-box">
                        <strong>Cost:</strong>
                        <span class="cost">${money(box.cost)}</span>
                    </div>

                    <div class="info-box">
                        <strong>Notes:</strong><br>
                        ${box.notes || "No notes added"}
                    </div>

                </div>
            `;
        });

        html += "</div>";

        document.getElementById("mysteryBoxList").innerHTML = html;
    })

    .catch(error=>{
        hideLoading();
        console.error(error);

        document.getElementById("mysteryBoxList").innerHTML =
        "<div class='empty-state'>Error loading mystery boxes.</div>";
    });
}

loadMysteryBoxes();
</script>

</body>
</html>
