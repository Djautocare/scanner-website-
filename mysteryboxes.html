<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Mystery Boxes</title>

<style>
html{touch-action:manipulation;}
*{box-sizing:border-box;}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(156,39,176,0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(255,193,7,0.14), transparent 35%),
        radial-gradient(circle at bottom, rgba(40,167,69,0.08), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{max-width:1150px;margin:0 auto;}

.panel{
    background:linear-gradient(180deg,#1d1d1d,#151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:22px;
    box-shadow:0 24px 70px rgba(0,0,0,0.42);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
    line-height:1.4;
}

.top-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:18px;
}

.top-actions.single-action{
    grid-template-columns:1fr;
}

.action-link,
.refresh-button{
    display:block;
    text-decoration:none;
    width:100%;
    padding:14px;
    margin:0;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    text-align:center;
    cursor:pointer;
}

.action-link{
    color:black;
    background:linear-gradient(135deg,#ffc107,#d39e00);
    border:1px solid rgba(255,193,7,0.45);
}

.refresh-button{
    color:white;
    background:linear-gradient(135deg,#9c27b0,#6f1a80);
    border:1px solid rgba(156,39,176,0.45);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px;
    margin-bottom:18px;
}

.summary-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:14px;
}

.summary-title{
    color:#aaa;
    font-size:12px;
    font-weight:bold;
    margin-bottom:6px;
}

.summary-value{
    font-size:22px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:14px;
    margin-top:18px;
}

.mb-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px;
    text-align:left;
    position:relative;
    overflow:hidden;
}

.mb-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:#777;
}

.mb-card.profit::before{
    background:linear-gradient(135deg,#00e676,#28a745);
}

.mb-card.loss::before{
    background:linear-gradient(135deg,#ff5252,#dc3545);
}

.mb-card.break-even::before{
    background:linear-gradient(135deg,#ffc107,#d39e00);
}

.mb-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:12px;
}

.mb-id{
    background:rgba(156,39,176,0.22);
    color:#e58cff;
    border:1px solid rgba(156,39,176,0.38);
    padding:7px 10px;
    border-radius:999px;
    font-weight:bold;
    font-size:13px;
    white-space:nowrap;
}

.mb-name{
    font-size:20px;
    font-weight:bold;
    line-height:1.25;
}

.mb-sub{
    color:#aaa;
    font-size:13px;
    margin-top:5px;
}

.badge-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin:10px 0 4px 0;
}

.status,
.profit-badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
}

.status-active{
    background:rgba(40,167,69,0.20);
    color:#54d86f;
    border:1px solid rgba(40,167,69,0.35);
}

.status-closed{
    background:rgba(120,120,120,0.22);
    color:#bbb;
    border:1px solid rgba(255,255,255,0.15);
}

.profit-positive{
    background:rgba(0,230,118,0.16);
    color:#00e676;
    border:1px solid rgba(0,230,118,0.35);
}

.profit-negative{
    background:rgba(255,82,82,0.16);
    color:#ff7777;
    border:1px solid rgba(255,82,82,0.35);
}

.profit-even{
    background:rgba(255,193,7,0.16);
    color:#ffc107;
    border:1px solid rgba(255,193,7,0.35);
}

.stat-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-top:12px;
}

.stat-box{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:10px;
}

.stat-title{
    color:#aaa;
    font-size:12px;
    margin-bottom:5px;
    font-weight:bold;
}

.stat-value{
    font-size:16px;
    font-weight:bold;
}

.green{color:#00e676;}
.red{color:#ff5252;}
.yellow{color:#ffc107;}
.blue{color:#66b2ff;}
.grey{color:#bbb;}

.progress-wrap{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:12px;
    margin-top:10px;
}

.progress-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    font-weight:bold;
}

.progress-bar{
    height:10px;
    background:#333;
    border-radius:999px;
    overflow:hidden;
    margin-top:9px;
}

.progress-fill{
    height:100%;
    background:linear-gradient(135deg,#ffc107,#00e676);
    width:0%;
}

.info-box{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:10px;
    margin-top:10px;
    color:#ddd;
    line-height:1.35;
}

.card-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:12px;
}

button{
    width:100%;
    padding:14px;
    margin:0;
    border:none;
    border-radius:12px;
    font-size:15px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.view-button{
    background:linear-gradient(135deg,#333,#222);
    border:1px solid rgba(255,255,255,0.10);
}

.close-button{
    background:linear-gradient(135deg,#dc3545,#8d1f2b);
    border:1px solid rgba(220,53,69,0.45);
}

.items-list{
    display:none;
    margin-top:12px;
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;
    padding:10px;
}

.item-row{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    padding:9px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.item-row:last-child{
    border-bottom:none;
}

.item-name{
    font-weight:bold;
}

.item-meta{
    color:#aaa;
    font-size:12px;
    margin-top:3px;
    line-height:1.35;
}

.item-left{
    font-weight:bold;
    color:#ffd75e;
    white-space:nowrap;
}

.empty-state{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:16px;
    text-align:center;
    color:#ddd;
    margin-top:18px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
}

#result{
    text-align:center;
    font-weight:bold;
    margin-top:10px;
}

#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #9c27b0;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:760px){
    h1{font-size:30px;}
    .panel{padding:18px;}
    .top-actions{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:1fr 1fr;}
    .mb-header{flex-direction:column;}
    .card-actions{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Mystery Boxes</h1>
<p class="subtitle">View profit by MB snapshot batch, track sell-through, and manage active/bulk sold status.</p>

<div class="top-actions single-action">
    <button class="refresh-button" onclick="loadMysteryBoxes()">Refresh Profit Page</button>
</div>

<div id="summary"></div>

<div id="result"></div>

<div id="mysteryBoxList">
    <div class="empty-state">Loading mystery boxes...</div>
</div>

<a class="link-card" href="index.html">← Back to Dashboard</a>
<a class="link-card" href="#" onclick="InventoryAPI.logout(); return false;">Logout</a>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
if(!InventoryAPI.requireLogin()){
    throw new Error("Login required");
}


function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function money(value){
    return "£" + Number(value || 0).toFixed(2);
}

function simpleDate(value){
    if(!value){
        return "";
    }

    const date = new Date(value);

    if(isNaN(date.getTime())){
        return "";
    }

    return date.toLocaleDateString("en-GB");
}

function profitClass(value){
    const number = Number(value || 0);

    if(number > 0){
        return "green";
    }

    if(number < 0){
        return "red";
    }

    return "yellow";
}

function cardClass(value){
    const number = Number(value || 0);

    if(number > 0){
        return "profit";
    }

    if(number < 0){
        return "loss";
    }

    return "break-even";
}

function profitBadge(value){
    const number = Number(value || 0);

    if(number > 0){
        return '<span class="profit-badge profit-positive">In Profit</span>';
    }

    if(number < 0){
        return '<span class="profit-badge profit-negative">Loss</span>';
    }

    return '<span class="profit-badge profit-even">Break Even</span>';
}

function sellThroughClass(value){
    const number = Number(value || 0);

    if(number >= 80){
        return "green";
    }

    if(number >= 50){
        return "yellow";
    }

    return "blue";
}

function mbNumber(value){
    const match = String(value || "").toUpperCase().match(/MB-(\d+)/);
    return match ? Number(match[1]) : 0;
}

function sortByMbNumber(boxes){
    return boxes.slice().sort((a,b) => {
        const aNum = mbNumber(a.mysteryBoxId);
        const bNum = mbNumber(b.mysteryBoxId);

        if(aNum !== bNum){
            return aNum - bNum;
        }

        return String(a.mysteryBoxId || "").localeCompare(String(b.mysteryBoxId || ""));
    });
}

function renderSummary(boxes){
    let activeCount = 0;
    let closedCount = 0;
    let totalCost = 0;
    let totalRevenue = 0;
    let totalProfit = 0;
    let totalOriginal = 0;
    let totalSold = 0;

    boxes.forEach(box=>{
        const status = String(box.status || "Active").toLowerCase();

        if(status === "active"){
            activeCount++;
        }else{
            closedCount++;
        }

        totalCost += Number(box.cost || 0);
        totalRevenue += Number(box.revenue || 0);
        totalProfit += Number(box.profit || 0);
        totalOriginal += Number(box.originalQty || 0);
        totalSold += Number(box.soldQty || 0);
    });

    const overallSellThrough =
    totalOriginal > 0 ? (totalSold / totalOriginal) * 100 : 0;

    document.getElementById("summary").innerHTML =
    `
    <div class="summary-grid">
        <div class="summary-card">
            <div class="summary-title">Total MB Batches</div>
            <div class="summary-value">${boxes.length}</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Active / Closed</div>
            <div class="summary-value"><span class="green">${activeCount}</span> / <span class="grey">${closedCount}</span></div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Total Cost</div>
            <div class="summary-value">${money(totalCost)}</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Total Revenue</div>
            <div class="summary-value green">${money(totalRevenue)}</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Total Profit</div>
            <div class="summary-value ${profitClass(totalProfit)}">${money(totalProfit)}</div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Overall Sell-through</div>
            <div class="summary-value ${sellThroughClass(overallSellThrough)}">${overallSellThrough.toFixed(2)}%</div>
        </div>
    </div>
    `;
}

function loadMysteryBoxes(){
    showLoading();

    InventoryAPI.request("/mystery-boxes/profit")

    .then(data=>{
        hideLoading();

        if(!data.success){
            document.getElementById("mysteryBoxList").innerHTML =
            "<div class='empty-state'>" + (data.error || "Could not load mystery boxes") + "</div>";
            return;
        }

        if(data.mysteryBoxes.length === 0){
            document.getElementById("summary").innerHTML = "";
            document.getElementById("mysteryBoxList").innerHTML =
            "<div class='empty-state'>No mystery boxes created yet.</div>";
            return;
        }

        const sortedBoxes = sortByMbNumber(data.mysteryBoxes);

        renderSummary(sortedBoxes);

        let html = "<div class='grid'>";

        sortedBoxes.forEach(box=>{
            const status = box.status || "Active";
            const statusClass =
            status.toLowerCase() === "active" ? "status-active" : "status-closed";

            const progress = Math.min(100, Number(box.sellThrough || 0));
            const created = simpleDate(box.dateCreated) || "Unknown";

            html += `
                <div class="mb-card ${cardClass(box.profit)}">

                    <div class="mb-header">
                        <div>
                            <div class="mb-name">${box.mysteryBoxId} | ${box.name}</div>
                            <div class="mb-sub">Created ${created}</div>
                            <div class="badge-row">
                                <span class="status ${statusClass}">${status}</span>
                                ${profitBadge(box.profit)}
                            </div>
                        </div>

                        <div class="mb-id">${box.mysteryBoxId}</div>
                    </div>

                    <div class="stat-grid">
                        <div class="stat-box">
                            <div class="stat-title">Cost</div>
                            <div class="stat-value">${money(box.cost)}</div>
                        </div>

                        <div class="stat-box">
                            <div class="stat-title">Revenue</div>
                            <div class="stat-value green">${money(box.revenue)}</div>
                        </div>

                        <div class="stat-box">
                            <div class="stat-title">Profit</div>
                            <div class="stat-value ${profitClass(box.profit)}">${money(box.profit)}</div>
                        </div>

                        <div class="stat-box">
                            <div class="stat-title">Original Items</div>
                            <div class="stat-value blue">${box.originalQty}</div>
                        </div>

                        <div class="stat-box">
                            <div class="stat-title">Sold Items</div>
                            <div class="stat-value green">${box.soldQty}</div>
                        </div>

                        <div class="stat-box">
                            <div class="stat-title">Remaining</div>
                            <div class="stat-value yellow">${box.remainingQty}</div>
                        </div>
                    </div>

                    <div class="progress-wrap">
                        <div class="progress-top">
                            <span>Sell-through</span>
                            <span class="${sellThroughClass(box.sellThrough)}">${Number(box.sellThrough || 0).toFixed(2)}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${progress}%"></div>
                        </div>
                    </div>

                    <div class="info-box">
                        <strong>Notes:</strong> ${box.notes || "No notes added"}
                    </div>

                    <div class="card-actions">
                        <button class="view-button" onclick="toggleItems('${box.mysteryBoxId}')">View Item Breakdown</button>
                        <button class="close-button" onclick="closeMysteryBox('${box.mysteryBoxId}')">Close / Bulk Sold</button>
                    </div>

                    <div class="items-list" id="items_${box.mysteryBoxId}">
                        ${renderItems(box.items || [])}
                    </div>

                </div>
            `;
        });

        html += "</div>";

        document.getElementById("mysteryBoxList").innerHTML = html;
    })

    .catch(error=>{
        hideLoading();
        console.error(error);

        document.getElementById("mysteryBoxList").innerHTML =
        "<div class='empty-state'>Error loading mystery boxes.</div>";
    });
}

function renderItems(items){
    if(!items || items.length === 0){
        return "<div class='empty-state'>No snapshot items found for this mystery box.</div>";
    }

    let html = "";

    items.forEach(item=>{
        const itemSellThrough =
        Number(item.originalQty || 0) > 0
        ? (Number(item.soldQty || 0) / Number(item.originalQty || 0)) * 100
        : 0;

        html += `
            <div class="item-row">
                <div>
                    <div class="item-name">${item.description || item.barcode}</div>
                    <div class="item-meta">
                        ${item.barcode}<br>
                        Sold ${item.soldQty}/${item.originalQty} • Revenue ${money(item.revenue)} • ${itemSellThrough.toFixed(0)}% sold
                    </div>
                </div>
                <div class="item-left">${item.remainingQty} left</div>
            </div>
        `;
    });

    return html;
}

function toggleItems(mysteryBoxId){
    const el = document.getElementById("items_" + mysteryBoxId);

    if(!el){
        return;
    }

    el.style.display = el.style.display === "block" ? "none" : "block";
}

function closeMysteryBox(mysteryBoxId){
    if(!confirm("Mark " + mysteryBoxId + " as Bulk Sold / Closed? Future removals will not allocate sales to this box.")){
        return;
    }

    showLoading();

    InventoryAPI.request("/mystery-boxes/" + encodeURIComponent(mysteryBoxId) + "/close",{
        method:"POST",
        body:JSON.stringify({
            status:"Bulk Sold"
        })
    })

    .then(data=>{
        hideLoading();

        if(!data.success){
            alert(data.error || "Could not close mystery box");
            return;
        }

        loadMysteryBoxes();
    })

    .catch(error=>{
        hideLoading();
        console.error(error);
        alert("Error closing mystery box");
    });
}

loadMysteryBoxes();
</script>

</body>
</html>
