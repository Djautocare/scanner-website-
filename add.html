<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Add Stock</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
html{touch-action:manipulation;}
*{box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:
        radial-gradient(circle at top left, rgba(40,167,69,0.14), transparent 35%),
        radial-gradient(circle at top right, rgba(32,201,151,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{max-width:760px;margin:0 auto;}

.panel{
    background:linear-gradient(180deg,#1d1d1d,#151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{text-align:center;font-size:34px;margin:12px 0 6px 0;}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,select,button,textarea{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,select,textarea{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

select{appearance:none;}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.primary-button{
    background:linear-gradient(135deg,#28a745,#1f8b3a);
    border:1px solid rgba(40,167,69,0.45);
    box-shadow:0 10px 30px rgba(40,167,69,0.18);
}

.search-button{
    background:linear-gradient(135deg,#0275d8,#025aa5);
    border:1px solid rgba(0,123,255,0.45);
}

.clear-button{
    background:linear-gradient(135deg,#333,#222);
    border:1px solid rgba(255,255,255,0.10);
}

.printjob-button{
    background:linear-gradient(135deg,#6f42c1,#56329b);
    border:1px solid rgba(111,66,193,0.45);
}

.result-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-top:10px;
}

.result-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:14px;
    text-align:left;
}

.result-title{
    font-weight:bold;
    font-size:18px;
    margin-bottom:8px;
}

.badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    margin-right:6px;
    margin-bottom:8px;
}

.barcode-badge{background:#0275d8;}
.qty-badge{background:#6f42c1;}

.select-existing-button{
    background:linear-gradient(135deg,#20c997,#138f6d);
    border:1px solid rgba(32,201,151,0.45);
    margin-top:8px;
}

.empty-state{
    background:#2a2a2a;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:14px;
    margin-top:10px;
    color:#ddd;
    text-align:center;
}

.checkbox-card{
    background:#2a2a2a;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:12px;
    margin:10px 0 16px 0;
    text-align:left;
}

.checkbox-card label{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.checkbox-card input{
    width:auto;
    margin:0;
}

.links-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:16px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,rgba(32,201,151,0.28),rgba(32,201,151,0.08));
    border:1px solid rgba(32,201,151,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
}

.back-card{
    background:linear-gradient(135deg,rgba(0,123,255,0.28),rgba(0,123,255,0.08));
    border-color:rgba(0,123,255,0.35);
}

#printArea{
    background:white;
    margin-top:20px;
    padding:5px;
    width:51mm;
    margin-left:auto;
    margin-right:auto;
    text-align:center;
    border-radius:6px;
}

#barcodeText{
    color:black;
    font-weight:bold;
    font-size:13px;
    margin:0;
    padding:0;
}

#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{text-align:center;color:white;font-weight:bold;}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:600px){
    h1{font-size:30px;}
    .panel{padding:18px;}
    .links-grid{grid-template-columns:1fr;}
}

@media print{
    @page{size:51mm 25mm;margin:0;}

    html,body{
        width:51mm;
        height:25mm;
        margin:0;
        padding:0;
        background:white;
    }

    body *{visibility:hidden;}

    #printArea,#printArea *{visibility:visible;}

    #printArea{
        position:fixed;
        left:0;
        top:0;
        width:51mm;
        height:25mm;
        padding:1.5mm;
        margin:0;
        box-sizing:border-box;
        background:white;
        text-align:center;
        overflow:hidden;
        border-radius:0;
    }

    #barcode{
        width:1.7in !important;
        height:0.6in !important;
        display:block !important;
        margin:0 auto !important;
    }

    #barcodeText{
        color:black;
        font-size:11px;
        font-weight:bold;
        margin:0;
        padding:0;
        line-height:1;
    }

    #loadingOverlay{display:none !important;}
}
</style>
</head>

<body>

<div class="page">
<div class="panel">

<h1>Add Stock</h1>
<p class="subtitle">Add stock, reuse product names, assign locations, and build print jobs</p>

<div class="form-card">

<div class="input-label">Search Existing Product First</div>
<input type="text" id="productSearch" placeholder="Search keywords or barcode">

<button class="search-button" onclick="searchExistingProduct()">Search Existing Products</button>
<button class="clear-button" onclick="clearSearchResults()">Clear Search Results</button>

<div id="searchResults"></div>

</div>

<div class="form-card">

<div class="input-label">Item Description</div>
<input type="text" id="description" placeholder="Example: Dyson charger">

<div class="input-label">Quantity</div>
<input type="number" id="qty" placeholder="Quantity" value="1" min="1">

<div class="input-label">Box / Location</div>
<select id="location">
<option value="">Loading boxes...</option>
</select>

<div class="checkbox-card">
    <label>
        <input type="checkbox" id="addToPrintJob">
        Add labels to print job
    </label>
</div>

<div class="input-label">Print Job</div>
<select id="printJob">
<option value="">Loading print jobs...</option>
</select>

<div class="input-label">New Print Job Name</div>
<input type="text" id="newPrintJobName" placeholder="Example: Mystery Box 1 Labels">

<button class="printjob-button" onclick="createPrintJob()">Create New Print Job</button>

<div class="checkbox-card">
    <label>
        <input type="checkbox" id="printLabels">
        Print label immediately after saving
    </label>
</div>

<button class="primary-button" onclick="saveProduct()">＋ Save Product</button>

</div>

<div class="links-grid">
    <a class="link-card" href="boxes.html">Create New Box</a>
    <a class="link-card back-card" href="index.html">← Back to Dashboard</a>
</div>

<div id="printArea">
    <svg id="barcode"></svg>
    <p id="barcodeText"></p>
</div>

</div>
</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let existingProductResults = [];

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function fillBoxDropdown(boxes){
    const select = document.getElementById("location");
    select.innerHTML = '<option value="">Select Box / Location</option>';

    if(!boxes || boxes.length === 0){
        select.innerHTML = '<option value="">No boxes created yet</option>';
        return;
    }

    boxes.forEach(item=>{
        const option = document.createElement("option");
        option.value = item.box;
        option.textContent = item.box;
        select.appendChild(option);
    });
}

function loadBoxes(){
    const cached = localStorage.getItem("inventoryBoxes");

    if(cached){
        try{
            fillBoxDropdown(JSON.parse(cached));
        }catch(e){}
    }

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({action:"GET_BOXES"})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success && data.boxes){
            localStorage.setItem("inventoryBoxes", JSON.stringify(data.boxes));
            fillBoxDropdown(data.boxes);
        }
    })
    .catch(error=>{
        console.error(error);
    });
}

function fillPrintJobDropdown(jobs){
    const select = document.getElementById("printJob");
    select.innerHTML = '<option value="">Select Print Job</option>';

    if(!jobs || jobs.length === 0){
        select.innerHTML = '<option value="">No print jobs created yet</option>';
        return;
    }

    jobs.forEach(job=>{
        const option = document.createElement("option");
        option.value = job.printJobId;
        option.textContent = job.printJobId + " - " + job.name;
        select.appendChild(option);
    });
}

function loadPrintJobs(){
    const cached = localStorage.getItem("inventoryPrintJobs");

    if(cached){
        try{
            fillPrintJobDropdown(JSON.parse(cached));
        }catch(e){}
    }

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({action:"GET_PRINT_JOBS"})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success && data.printJobs){
            localStorage.setItem("inventoryPrintJobs", JSON.stringify(data.printJobs));
            fillPrintJobDropdown(data.printJobs);
        }
    })
    .catch(error=>{
        console.error(error);
    });
}

function createPrintJob(){
    const name = document.getElementById("newPrintJobName").value.trim();

    if(!name){
        alert("Enter a print job name");
        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"CREATE_PRINT_JOB",
            name:name
        })
    })
    .then(res=>res.json())
    .then(data=>{
        hideLoading();

        if(!data.success){
            alert(data.error || "Could not create print job");
            return;
        }

        document.getElementById("newPrintJobName").value = "";
        document.getElementById("addToPrintJob").checked = true;

        localStorage.removeItem("inventoryPrintJobs");

        loadPrintJobs();

        setTimeout(function(){
            document.getElementById("printJob").value = data.printJobId;
        }, 500);

        alert("Created print job: " + data.printJobId);
    })
    .catch(error=>{
        hideLoading();
        console.error(error);
        alert("Error creating print job");
    });
}

function searchExistingProduct(){
    const query = document.getElementById("productSearch").value.trim();

    if(!query){
        alert("Enter keywords or barcode to search");
        return;
    }

    document.getElementById("searchResults").innerHTML =
    "<div class='empty-state'>Searching...</div>";

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"SEARCH",
            query:query
        })
    })
    .then(res=>res.json())
    .then(data=>{
        hideLoading();

        if(!data.success || data.results.length === 0){
            document.getElementById("searchResults").innerHTML =
            "<div class='empty-state'>No existing products found. You can enter a new description below.</div>";
            return;
        }

        existingProductResults = data.results;

        let html = "<div class='result-grid'>";

        data.results.forEach((item,index)=>{
            html += `
                <div class="result-card">
                    <div class="result-title">${item.description}</div>
                    <div class="badge barcode-badge">${item.barcode}</div>
                    <div class="badge qty-badge">Current Qty ${item.totalQty}</div>

                    <button class="select-existing-button" onclick="selectExistingProduct(${index})">
                    Use This Product Name
                    </button>
                </div>
            `;
        });

        html += "</div>";
        document.getElementById("searchResults").innerHTML = html;
    })
    .catch(error=>{
        hideLoading();
        console.error(error);
        document.getElementById("searchResults").innerHTML =
        "<div class='empty-state'>Error searching existing products.</div>";
    });
}

function selectExistingProduct(index){
    const item = existingProductResults[index];

    if(!item) return;

    document.getElementById("description").value = item.description;
    document.getElementById("searchResults").innerHTML =
    "<div class='empty-state'>Selected existing product: <strong>" +
    item.description +
    "</strong></div>";

    document.getElementById("qty").focus();
}

function clearSearchResults(){
    document.getElementById("productSearch").value = "";
    document.getElementById("searchResults").innerHTML = "";
    existingProductResults = [];
}

function saveProduct(){
    const description = document.getElementById("description").value.trim();
    const qty = document.getElementById("qty").value;
    const location = document.getElementById("location").value;
    const printLabels = document.getElementById("printLabels").checked;
    const addToPrintJob = document.getElementById("addToPrintJob").checked;
    const printJobId = document.getElementById("printJob").value;

    if(!description){
        alert("Enter description");
        return;
    }

    if(!location){
        alert("Select a box/location");
        return;
    }

    if(addToPrintJob && !printJobId){
        alert("Select a print job or create one first");
        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"ADD",
            description:description,
            qty:qty,
            location:location,
            addToPrintJob:addToPrintJob,
            printJobId:printJobId
        })
    })
    .then(res=>res.json())
    .then(data=>{
        hideLoading();

        if(!data.success){
            alert(data.error || "Error");
            return;
        }

        document.getElementById("barcodeText").innerText = data.barcode;

        JsBarcode("#barcode", data.barcode, {
            format:"CODE128",
            displayValue:false,
            width:2,
            height:35,
            margin:8
        });

        let message = "Saved Successfully\n\nBarcode: " + data.barcode;

        if(addToPrintJob){
            message += "\nAdded to print job: " + printJobId;
            message += "\nLabel count added: " + qty;
        }

        alert(message);

        if(printLabels){
            window.open(
                "label.html?barcode=" + encodeURIComponent(data.barcode),
                "_blank"
            );
        }

        document.getElementById("description").value = "";
        document.getElementById("qty").value = "1";
        document.getElementById("productSearch").value = "";
        document.getElementById("searchResults").innerHTML = "";
        existingProductResults = [];

        document.getElementById("productSearch").focus();
    })
    .catch(error=>{
        hideLoading();
        console.error(error);
        alert("Error saving product");
    });
}

document.getElementById("productSearch").addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        searchExistingProduct();
    }
});

document.getElementById("description").addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        saveProduct();
    }
});

document.getElementById("qty").addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        saveProduct();
    }
});

document.getElementById("location").addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        saveProduct();
    }
});

document.getElementById("newPrintJobName").addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        createPrintJob();
    }
});

loadBoxes();
loadPrintJobs();
</script>

</body>
</html>
