<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Add Stock</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:450px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}

#printArea{
    background:white;
    margin-top:20px;
    padding:5px;
    width:51mm;
    margin-left:auto;
    margin-right:auto;
    text-align:center;
}

#barcodeText{
    color:black;
    font-weight:bold;
    font-size:13px;
    margin:0;
    padding:0;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media print {
    @page {
        size:51mm 25mm;
        margin:0;
    }

    html,
    body{
        width:51mm;
        height:25mm;
        margin:0;
        padding:0;
        background:white;
    }

    body *{
        visibility:hidden;
    }

    #printArea,
    #printArea *{
        visibility:visible;
    }

    #printArea{
        position:fixed;
        left:0;
        top:0;
        width:51mm;
        height:25mm;
        padding:1.5mm;
        margin:0;
        box-sizing:border-box;
        background:white;
        text-align:center;
        overflow:hidden;
    }

#barcode{
    width:1.7in !important;
    height:0.6in !important;
    display:block !important;
    margin:0 auto !important;
}

    #barcodeText{
        color:black;
        font-size:11px;
        font-weight:bold;
        margin:0;
        padding:0;
        line-height:1;
    }

    #loadingOverlay{
        display:none !important;
    }
}
</style>
</head>

<body>

<div class="box">

<h1>Add Stock</h1>

<input type="text" id="description" placeholder="Item Description">

<input type="number" id="qty" placeholder="Quantity" value="1">

<select id="location">
<option value="">Select Box / Location</option>
</select>

<label>
<input type="checkbox" id="printLabels" checked>
Print Labels
</label>

<br>

<button onclick="saveProduct()">Save Product</button>

<p><a href="boxes.html">Create New Box</a></p>

<p><a href="index.html">← Back to Dashboard</a></p>

<div id="printArea">
    <svg id="barcode"></svg>
    <p id="barcodeText"></p>
</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function loadBoxes(){

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"GET_BOXES"
        })
    })

    .then(res=>res.json())

    .then(data=>{

        const select = document.getElementById("location");

        select.innerHTML =
        '<option value="">Select Box / Location</option>';

        if(!data.success || data.boxes.length === 0){

            const option = document.createElement("option");

            option.value = "";

            option.textContent = "No boxes created yet";

            select.appendChild(option);

            return;
        }

        data.boxes.forEach(item=>{

            const option = document.createElement("option");

            option.value = item.box;

            option.textContent = item.box;

            select.appendChild(option);

        });

    })

    .catch(error=>{

        console.error(error);

        alert("Could not load boxes");

    });

}

function saveProduct(){

    const description =
    document.getElementById("description")
    .value
    .trim();

    const qty =
    document.getElementById("qty")
    .value;

    const location =
    document.getElementById("location")
    .value;

    const printLabels =
    document.getElementById("printLabels")
    .checked;

    if(!description){

        alert("Enter description");

        return;
    }

    if(!location){

        alert("Select a box/location");

        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"ADD",
            description:description,
            qty:qty,
            location:location
        })
    })

    .then(res=>res.json())

    .then(data=>{

        hideLoading();

        if(!data.success){

            alert(data.error || "Error");

            return;
        }

        document.getElementById("barcodeText")
        .innerText = data.barcode;

 JsBarcode("#barcode", barcode, {
    format:"CODE128",
    displayValue:false,
    width:2,
    height:35,
    margin:8
});
        
alert("Saved Successfully\n\nBarcode: " + data.barcode);

if(printLabels){

    window.open(
        "label.html?barcode=" + encodeURIComponent(data.barcode),
        "_blank"
    );

}

hideLoading();
    })

    .catch(error=>{

        hideLoading();

        console.error(error);

        alert("Error saving product");

    });

}

loadBoxes();
</script>

</body>
</html>
