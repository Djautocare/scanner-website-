<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Inventory Dashboard</title>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:450px;
    margin:auto;
}

input,
button,
textarea,
select{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.link-button{
    display:block;
    background:#333;
    color:white;
    padding:14px;
    margin:12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.stat{
    background:#2a2a2a;
    padding:12px;
    margin:10px;
    border-radius:8px;
}

#app{
    display:none;
}

#loginError{
    color:#ff7777;
    font-weight:bold;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box" id="loginBox">

<h1>Inventory Login</h1>

<input type="password" id="password" placeholder="Enter password">

<button onclick="login()">Login</button>

<p id="loginError"></p>

</div>

<div class="box" id="app">

<h1>Inventory Dashboard</h1>

<div class="stat" id="totalProducts">Products: Loading...</div>
<div class="stat" id="totalStock">Stock Units: Loading...</div>
<div class="stat" id="totalBoxes">Boxes Used: Loading...</div>

<a class="link-button" href="add.html">Add Stock</a>
<a class="link-button" href="remove.html">Remove Stock</a>
<a class="link-button" href="search.html">Search Stock</a>
<a class="link-button" href="move.html">Move Stock</a>
<a class="link-button" href="boxes.html">Create / View Boxes</a>
 <a class="link-button" href="reprint.html">Reprint Product Label</a>
<a class="link-button" href="boxlabels.html">Print Box Labels</a>   

<button onclick="logout()">Logout</button>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
</div>

<script>
const PASSWORD = "Sales";

const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function login(){

    const entered =
    document.getElementById("password")
    .value;

    if(entered === PASSWORD){

        localStorage.setItem("inventoryLoggedIn", "yes");

        showApp();

    }else{

        document.getElementById("loginError")
        .innerText = "Wrong password";

    }

}

function logout(){

    localStorage.removeItem("inventoryLoggedIn");

    location.reload();

}

function showApp(){

    document.getElementById("loginBox")
    .style.display = "none";

    document.getElementById("app")
    .style.display = "block";

    loadStats();

}

function loadStats(){

    showLoading();

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"STATS"
        })
    })

    .then(res => res.json())

    .then(data => {

        hideLoading();

        if(data.success){

            document.getElementById("totalProducts")
            .innerText =
            "Products: " + data.totalProducts;

            document.getElementById("totalStock")
            .innerText =
            "Stock Units: " + data.totalStock;

            document.getElementById("totalBoxes")
            .innerText =
            "Boxes Used: " + data.totalBoxes;

        }else{

            document.getElementById("totalProducts")
            .innerText =
            "Could not load stats";

            document.getElementById("totalStock")
            .innerText =
            "Stock Units: -";

            document.getElementById("totalBoxes")
            .innerText =
            "Boxes Used: -";

        }

    })

    .catch(error => {

        hideLoading();

        console.error(error);

        document.getElementById("totalProducts")
        .innerText =
        "Could not load stats";

        document.getElementById("totalStock")
        .innerText =
        "Stock Units: -";

        document.getElementById("totalBoxes")
        .innerText =
        "Boxes Used: -";

    });

}

if(localStorage.getItem("inventoryLoggedIn") === "yes"){
    showApp();
}
</script>

</body>
</html>
