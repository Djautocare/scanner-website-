
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Djatocare Inventory</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:400px;
    margin:auto;
}

input, button{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#printArea{
    background:white;
    margin-top:20px;
    padding:20px;
}

#barcodeText{
    color:black;
    font-size:20px;
    font-weight:bold;
}

@media print {

    body * {
        visibility:hidden;
    }

    #printArea,
    #printArea * {
        visibility:visible;
    }

    #printArea{
        position:absolute;
        left:0;
        top:0;
        width:100%;
    }

}

</style>

</head>

<body>

<div class="box">

<h1>Djatocare Inventory</h1>

<input type="text" id="description" placeholder="Item Description">

<input type="number" id="qty" placeholder="Quantity">

<input type="text" id="location" placeholder="Current Box (BOX-A1)">

<label>
<input type="checkbox" id="printLabels" checked>
Print Labels
</label>

<br>

<button onclick="saveProduct()">Save Product</button>

<div id="printArea">

<svg id="barcode"></svg>

<p id="barcodeText"></p>

</div>

</div>

<script>

function saveProduct(){

    const description =
    document.getElementById("description").value;

    const qty =
    document.getElementById("qty").value;

    const location =
    document.getElementById("location").value;

    const printLabels =
    document.getElementById("printLabels").checked;

    if(!description){
        alert("Enter description");
        return;
    }

    fetch("https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec", {

        method:"POST",

        body:JSON.stringify({
            description:description,
            qty:qty,
            location:location
        })

    })

    .then(res => res.json())

    .then(data => {

        const barcode = data.barcode;

        document.getElementById("barcodeText")
        .innerText = barcode;

        JsBarcode("#barcode", barcode, {
            format:"CODE128",
            displayValue:false,
            width:2,
            height:70,
            margin:10
        });

        if(printLabels){
            window.print();
        }

        alert("Saved Successfully");

    })

    .catch(error => {

        console.error(error);

        alert("Error saving product");

    });

}

</script>

</body>
</html>
