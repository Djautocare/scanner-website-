<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Inventory Dashboard</title>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:450px;
    margin:auto;
}

input, button{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.link-button{
    display:block;
    background:#333;
    color:white;
    padding:14px;
    margin:12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.stat{
    background:#2a2a2a;
    padding:12px;
    margin:10px;
    border-radius:8px;
}

#app{
    display:none;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h1>Inventory Login</h1>

<input type="password" id="password" placeholder="Enter password">

<button onclick="login()">Login</button>

<p id="loginError"></p>
</div>

<div class="box" id="app">

<h1>Inventory Dashboard</h1>

<div class="stat" id="totalProducts">Products: Loading...</div>
<div class="stat" id="totalStock">Stock Units: Loading...</div>
<div class="stat" id="totalBoxes">Boxes Used: Loading...</div>

<a class="link-button" href="add.html">Add Stock</a>
<a class="link-button" href="remove.html">Remove Stock</a>
<a class="link-button" href="search.html">Search Stock</a>

<button onclick="logout()">Logout</button>

</div>

<script>
const PASSWORD = "changeme123";

const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function login(){
    const entered = document.getElementById("password").value;

    if(entered === PASSWORD){
        localStorage.setItem("inventoryLoggedIn", "yes");
        showApp();
    }else{
        document.getElementById("loginError").innerText = "Wrong password";
    }
}

function logout(){
    localStorage.removeItem("inventoryLoggedIn");
    location.reload();
}

function showApp(){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadStats();
}

function loadStats(){
    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"STATS"
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){

            document.getElementById("totalProducts").innerText =
            "Products: " + data.totalProducts;

            document.getElementById("totalStock").innerText =
            "Stock Units: " + data.totalStock;

            document.getElementById("totalBoxes").innerText =
            "Boxes Used: " + data.totalBoxes;

        }else{

            document.getElementById("totalProducts").innerText =
            "Could not load stats";

        }

    })
    .catch(error => {
        console.error(error);

        document.getElementById("totalProducts").innerText =
        "Could not load stats";
    });
}

if(localStorage.getItem("inventoryLoggedIn") === "yes"){
    showApp();
}
</script>

</body>
</html>
