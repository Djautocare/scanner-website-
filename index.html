<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Djatocare Inventory</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <style>
    body{
      font-family: Arial;
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }

    input, button{
      padding:12px;
      margin:10px;
      width:300px;
      border-radius:8px;
      border:none;
    }

    button{
      cursor:pointer;
      background:#4CAF50;
      color:white;
      font-weight:bold;
    }

    #reader{
      width:300px;
      margin:auto;
      margin-top:20px;
    }

    #barcode{
      background:white;
      padding:10px;
      margin-top:20px;
    }

    .box{
      background:#1e1e1e;
      padding:20px;
      border-radius:12px;
      max-width:400px;
      margin:auto;
    }
  </style>
</head>

<body>

<div class="box">

<h1>Djatocare Inventory</h1>

<input type="text" id="description" placeholder="Item Description">

<input type="number" id="qty" placeholder="Quantity">

<input type="text" id="location" placeholder="Current Box (BOX-A1)">

<label>
  <input type="checkbox" id="printLabels" checked>
  Print Labels
</label>

<br>

<button onclick="saveProduct()">Save Product</button>

<h2>Generated Barcode</h2>

<svg id="barcode"></svg>

<p id="barcodeText"></p>

</div>

<script>

let productCounter = 1000;

const products = {};

function saveProduct(){

    const description = document.getElementById("description").value;
    const qty = document.getElementById("qty").value;
    const location = document.getElementById("location").value;
    const printLabels = document.getElementById("printLabels").checked;

    if(!description){
        alert("Enter description");
        return;
    }

    let barcode;

    // check if already exists
    if(products[description]){
        barcode = products[description];
    }else{
        productCounter++;
        barcode = "ITEM-" + productCounter;
        products[description] = barcode;
    }

    document.getElementById("barcodeText").innerText = barcode;

    JsBarcode("#barcode", barcode, {
        format:"CODE128",
        displayValue:true
    });

    console.log({
        description,
        qty,
        location,
        barcode
    });

    if(printLabels){
        window.print();
    }

    alert("Product Saved");
}

</script>

</body>
</html>
