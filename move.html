<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Move Stock</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
html{
    touch-action: manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(253,126,20,0.14), transparent 35%),
        radial-gradient(circle at top right, rgba(0,123,255,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:760px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg, #1d1d1d, #151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
select,
button,
textarea{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,
select,
textarea{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.button-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin:12px 0;
}

.scan-button{
    background:linear-gradient(135deg, #0275d8, #025aa5);
}

.stop-button{
    background:linear-gradient(135deg, #dc3545, #a92735);
}

.torch-button{
    background:linear-gradient(135deg, #ffc107, #d39e00);
    color:black;
}

.move-button{
    background:linear-gradient(135deg, #fd7e14, #c85f08);
    border:1px solid rgba(253,126,20,0.45);
    box-shadow:0 10px 30px rgba(253,126,20,0.16);
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.10);
    overflow:hidden;
}

#result{
    margin-top:15px;
    font-weight:bold;
    background:#2a2a2a;
    border-radius:14px;
    padding:12px;
    min-height:45px;
    border:1px solid rgba(255,255,255,0.08);
}

.links-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-top:16px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }

    .button-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Move Stock</h1>
<p class="subtitle">Move items between boxes while keeping stock quantities correct</p>

<div class="form-card">

<div class="input-label">Barcode</div>
<input type="text" id="barcode" placeholder="Scan / Enter Barcode">

<div class="button-grid">
    <button class="scan-button" onclick="startScanner()">Start Scanner</button>
    <button class="torch-button" onclick="toggleTorch()">Toggle Flashlight</button>
</div>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<video id="reader" playsinline></video>

<div class="input-label">From Location</div>
<select id="fromLocation">
<option value="">From Location</option>
</select>

<div class="input-label">To Location</div>
<select id="toLocation">
<option value="">To Location</option>
</select>

<div class="input-label">Quantity</div>
<input type="number" id="qty" placeholder="Quantity" value="1" min="1">

<button class="move-button" onclick="moveStock()">Move Stock</button>

<p id="result">Ready to move stock.</p>

</div>

<div class="links-grid">
    <a class="link-card" href="index.html">← Back to Dashboard</a>
</div>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let codeReader = null;
let controls = null;
let torchOn = false;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function beep(){
    try{
        const audioCtx =
        new (window.AudioContext || window.webkitAudioContext)();

        const oscillator =
        audioCtx.createOscillator();

        const gain =
        audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 900;

        gain.gain.value = 0.15;

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();

        setTimeout(function(){
            oscillator.stop();
            audioCtx.close();
        }, 120);

    }catch(error){
        console.log("Beep not supported");
    }
}

function scanFeedback(){
    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    beep();
}

async function toggleTorch(){
    try{
        const video = document.getElementById("reader");

        if(!video.srcObject){
            alert("Start scanner first");
            return;
        }

        const track = video.srcObject.getVideoTracks()[0];

        torchOn = !torchOn;

        await track.applyConstraints({
            advanced:[{
                torch: torchOn
            }]
        });

        document.getElementById("result").innerText =
        torchOn ? "Flashlight on" : "Flashlight off";

    }catch(error){
        alert("Flashlight not supported on this device/browser");
    }
}

function loadBoxes(){
    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"GET_BOXES"
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(!data.success){
            return;
        }

        const fromSelect = document.getElementById("fromLocation");
        const toSelect = document.getElementById("toLocation");

        fromSelect.innerHTML = '<option value="">From Location</option>';
        toSelect.innerHTML = '<option value="">To Location</option>';

        data.boxes.forEach(item=>{
            const option1 = document.createElement("option");
            option1.value = item.box;
            option1.textContent = item.box;

            const option2 = document.createElement("option");
            option2.value = item.box;
            option2.textContent = item.box;

            fromSelect.appendChild(option1);
            toSelect.appendChild(option2);
        });
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        alert("Could not load boxes");
    });
}

function startScanner(){
    const video = document.getElementById("reader");

    video.style.display = "block";

    video.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    codeReader =
    new ZXingBrowser.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(
        null,
        "reader",
        function(result, error, ctrl){

            if(ctrl){
                controls = ctrl;
            }

            if(result){
                const barcode =
                result
                .getText()
                .trim()
                .toUpperCase();

                scanFeedback();

                document.getElementById("barcode").value = barcode;

                document.getElementById("result").innerText =
                "Scanned: " + barcode;

                stopScanner();
            }
        }
    )
    .then(function(ctrl){
        controls = ctrl;
    })
    .catch(function(error){
        console.error(error);

        alert("Could not start scanner. Check camera permissions.");

        scannerStarted = false;

        video.style.display = "none";
    });

    scannerStarted = true;
}

function stopScanner(){
    if(controls){
        controls.stop();
        controls = null;
    }

    const video = document.getElementById("reader");

    if(video && video.srcObject){
        video.srcObject
        .getTracks()
        .forEach(track => track.stop());

        video.srcObject = null;
    }

    video.style.display = "none";

    scannerStarted = false;
    torchOn = false;
}

function moveStock(){
    const barcode =
    document.getElementById("barcode")
    .value
    .trim()
    .toUpperCase();

    const fromLocation =
    document.getElementById("fromLocation")
    .value;

    const toLocation =
    document.getElementById("toLocation")
    .value;

    const qty =
    document.getElementById("qty")
    .value || 1;

    if(!barcode || !fromLocation || !toLocation){
        alert("Enter barcode, from location and to location");
        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"MOVE",
            barcode:barcode,
            fromLocation:fromLocation,
            toLocation:toLocation,
            qty:qty
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(data.success){
            document.getElementById("result").innerText =
            "Moved " +
            data.qty +
            " of " +
            data.barcode +
            " from " +
            data.fromLocation +
            " to " +
            data.toLocation;

            document.getElementById("barcode").value = "";
            document.getElementById("qty").value = "1";
        }else{
            document.getElementById("result").innerText =
            data.error || "Move failed";
        }
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        alert("Error moving stock");
    });
}

loadBoxes();
</script>

</body>
</html>
