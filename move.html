<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Move Stock</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#0275d8;
}

.stop-button{
    background:#d9534f;
}

.torch-button{
    background:#f0ad4e;
    color:black;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:10px;
}

#result{
    font-weight:bold;
    margin-top:15px;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<h1>Move Stock</h1>

<input type="text" id="barcode" placeholder="Scan / Enter Barcode">

<button class="scan-button" onclick="startScanner()">Start Scanner</button>

<button class="torch-button" onclick="toggleTorch()">Toggle Flashlight</button>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<video id="reader" playsinline></video>

<select id="fromLocation">
<option value="">From Location</option>
</select>

<select id="toLocation">
<option value="">To Location</option>
</select>

<input type="number" id="qty" placeholder="Quantity" value="1">

<button onclick="moveStock()">Move Stock</button>

<p id="result"></p>

<p><a href="index.html">← Back to Dashboard</a></p>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let codeReader = null;
let controls = null;
let torchOn = false;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function beep(){
    try{
        const audioCtx =
        new (window.AudioContext || window.webkitAudioContext)();

        const oscillator =
        audioCtx.createOscillator();

        const gain =
        audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 900;

        gain.gain.value = 0.15;

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();

        setTimeout(function(){
            oscillator.stop();
            audioCtx.close();
        }, 120);

    }catch(error){
        console.log("Beep not supported");
    }
}

function scanFeedback(){

    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    beep();

}

async function toggleTorch(){

    try{

        const video =
        document.getElementById("reader");

        if(!video.srcObject){
            alert("Start scanner first");
            return;
        }

        const track =
        video.srcObject.getVideoTracks()[0];

        torchOn = !torchOn;

        await track.applyConstraints({
            advanced:[{
                torch: torchOn
            }]
        });

        document.getElementById("result")
        .innerText =
        torchOn ? "Flashlight on" : "Flashlight off";

    }catch(error){

        alert("Flashlight not supported on this device/browser");

    }

}

function loadBoxes(){

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"GET_BOXES"
        })
    })

    .then(res=>res.json())

    .then(data=>{

        hideLoading();

        if(!data.success){
            return;
        }

        const fromSelect =
        document.getElementById("fromLocation");

        const toSelect =
        document.getElementById("toLocation");

        fromSelect.innerHTML =
        '<option value="">From Location</option>';

        toSelect.innerHTML =
        '<option value="">To Location</option>';

        data.boxes.forEach(item=>{

            const option1 =
            document.createElement("option");

            option1.value = item.box;

            option1.textContent = item.box;

            const option2 =
            document.createElement("option");

            option2.value = item.box;

            option2.textContent = item.box;

            fromSelect.appendChild(option1);

            toSelect.appendChild(option2);

        });

    })

    .catch(error=>{

        hideLoading();

        console.error(error);

        alert("Could not load boxes");

    });

}

function startScanner(){

    const video =
    document.getElementById("reader");

    video.style.display = "block";

    video.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    codeReader =
    new ZXingBrowser.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(
        null,
        "reader",
        function(result, error, ctrl){

            if(ctrl){
                controls = ctrl;
            }

            if(result){

                const barcode =
                result
                .getText()
                .trim()
                .toUpperCase();

                scanFeedback();

                document.getElementById("barcode")
                .value = barcode;

                document.getElementById("result")
                .innerText =
                "Scanned: " + barcode;

                stopScanner();

            }

        }
    )
    .then(function(ctrl){

        controls = ctrl;

    })
    .catch(function(error){

        console.error(error);

        alert("Could not start scanner. Check camera permissions.");

        scannerStarted = false;

        video.style.display = "none";

    });

    scannerStarted = true;
}

function stopScanner(){

    if(controls){

        controls.stop();

        controls = null;

    }

    const video =
    document.getElementById("reader");

    if(video && video.srcObject){

        video.srcObject
        .getTracks()
        .forEach(track => track.stop());

        video.srcObject = null;

    }

    video.style.display = "none";

    scannerStarted = false;
    torchOn = false;
}

function moveStock(){

    const barcode =
    document.getElementById("barcode")
    .value
    .trim()
    .toUpperCase();

    const fromLocation =
    document.getElementById("fromLocation")
    .value;

    const toLocation =
    document.getElementById("toLocation")
    .value;

    const qty =
    document.getElementById("qty")
    .value || 1;

    if(!barcode || !fromLocation || !toLocation){

        alert("Enter barcode, from location and to location");

        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"MOVE",
            barcode:barcode,
            fromLocation:fromLocation,
            toLocation:toLocation,
            qty:qty
        })
    })

    .then(res=>res.json())

    .then(data=>{

        hideLoading();

        if(data.success){

            document.getElementById("result")
            .innerText =
            "Moved " +
            data.qty +
            " of " +
            data.barcode +
            " from " +
            data.fromLocation +
            " to " +
            data.toLocation;

            document.getElementById("barcode")
            .value = "";

        }else{

            document.getElementById("result")
            .innerText =
            data.error || "Move failed";

        }

    })

    .catch(error=>{

        hideLoading();

        console.error(error);

        alert("Error moving stock");

    });

}

loadBoxes();
</script>

</body>
</html>
