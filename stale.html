<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Stale Stock</title>

<style>
html{
    touch-action: manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(255,193,7,0.15), transparent 35%),
        radial-gradient(circle at top right, rgba(255,87,34,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:950px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg,#1d1d1d,#151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.summary-card{
    background:linear-gradient(135deg,#ffc107,#ff9800);
    color:black;
    padding:18px;
    border-radius:16px;
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin:8px 0 14px 0;
}

.refresh-button{
    background:linear-gradient(135deg,#ffc107,#d39e00);
    color:black;
    border:1px solid rgba(255,193,7,0.45);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
    margin-top:20px;
}

.item-card{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:16px;
    text-align:left;
}

.item-name{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

.badge{
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    margin-right:6px;
    margin-bottom:8px;
}

.location-badge{
    background:#007bff;
}

.qty-badge{
    background:#6f42c1;
}

.days-badge{
    background:#dc3545;
}

.barcode-box{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:10px;
    margin-top:10px;
    color:#ddd;
    word-break:break-word;
}

.quick-sale{
    background:linear-gradient(135deg,#dc3545,#a92735);
    color:white;
    margin-top:12px;
}

.empty-state{
    background:linear-gradient(145deg,#242424,#191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:18px;
    border-radius:16px;
    text-align:center;
    color:#ddd;
    margin-top:20px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
    margin-top:20px;
}

@media(max-width:600px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Stale Stock Report</h1>

<p class="subtitle">
Items sitting for 14+ days with no sales recorded.
</p>

<div id="summary" class="summary-card">
Loading stale stock...
</div>

<button class="refresh-button" onclick="loadStaleStock()">
Refresh Report
</button>

<div id="results"></div>

<a class="link-card" href="index.html">← Back to Dashboard</a>

</div>

</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function loadStaleStock(){

    document.getElementById("summary").innerHTML =
    "Loading stale stock...";

    document.getElementById("results").innerHTML =
    "";

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"STALE"
        })
    })

    .then(res=>res.json())

    .then(data=>{

        if(!data.success){

            document.getElementById("summary").innerHTML =
            "Could not load stale stock";

            document.getElementById("results").innerHTML =
            `
            <div class="empty-state">
                Something went wrong loading the report.
            </div>
            `;

            return;
        }

        document.getElementById("summary").innerHTML =
        "⚠️ " + data.results.length + " stale item(s) found";

        if(data.results.length === 0){

            document.getElementById("results").innerHTML =
            `
            <div class="empty-state">
                <h3>✅ No stale stock found</h3>
                <p>Everything has had a sale/removal recorded recently.</p>
            </div>
            `;

            return;
        }

        let html = "<div class='grid'>";

        data.results.forEach(item=>{

            html += `
            <div class="item-card">

                <div class="item-name">
                    ${item.description || item.barcode}
                </div>

                <div class="badge location-badge">
                    ${item.location}
                </div>

                <div class="badge qty-badge">
                    Qty ${item.qty}
                </div>

                <div class="badge days-badge">
                    ${item.daysOld} Days
                </div>

                <div class="barcode-box">
                    <strong>Barcode:</strong><br>
                    ${item.barcode}
                </div>

                <button
                class="quick-sale"
                onclick="window.location.href='remove.html?barcode=${encodeURIComponent(item.barcode)}&location=${encodeURIComponent(item.location)}'">
                Quick Sale
                </button>

            </div>
            `;
        });

        html += "</div>";

        document.getElementById("results").innerHTML =
        html;

    })

    .catch(error=>{

        console.error(error);

        document.getElementById("summary").innerHTML =
        "Error loading stale stock";

        document.getElementById("results").innerHTML =
        `
        <div class="empty-state">
            Error loading stale stock.
        </div>
        `;

    });

}

loadStaleStock();
</script>

</body>
</html>
