<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Box</title>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:20px;}
.box{background:#1e1e1e;padding:20px;border-radius:12px;max-width:500px;margin:auto;}
input,button{width:90%;padding:12px;margin:10px;border:none;border-radius:8px;}
button{background:#4CAF50;color:white;font-weight:bold;cursor:pointer;}
a{color:#4CAF50;text-decoration:none;font-weight:bold;}
.box-card{background:#2a2a2a;padding:10px;margin:10px;border-radius:8px;text-align:left;}
</style>
</head>

<body>

<div class="box">
<h1>Create Box</h1>

<input type="text" id="boxName" placeholder="Box name e.g. BOX-A1">
<input type="text" id="notes" placeholder="Notes e.g. Hoodies / Shoes">

<button onclick="createBox()">Create Box</button>

<h2>Existing Boxes</h2>
<div id="boxList">Loading...</div>

<p><a href="index.html">← Back to Dashboard</a></p>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function createBox(){
    const box = document.getElementById("boxName").value.trim().toUpperCase();
    const notes = document.getElementById("notes").value.trim();

    if(!box){
        alert("Enter box name");
        return;
    }

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"CREATE_BOX",
            box:box,
            notes:notes
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            alert("Box created: " + data.box);
            document.getElementById("boxName").value = "";
            document.getElementById("notes").value = "";
            loadBoxes();
        }else{
            alert(data.error || "Could not create box");
        }
    });
}

function loadBoxes(){
    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({action:"GET_BOXES"})
    })
    .then(res=>res.json())
    .then(data=>{
        if(!data.success){
            document.getElementById("boxList").innerHTML = "Could not load boxes";
            return;
        }

        if(data.boxes.length === 0){
            document.getElementById("boxList").innerHTML = "No boxes created yet.";
            return;
        }

        let html = "";

        data.boxes.forEach(item=>{
            html += `
                <div class="box-card">
                    <strong>${item.box}</strong><br>
                    ${item.notes || ""}
                </div>
            `;
        });

        document.getElementById("boxList").innerHTML = html;
    });
}

loadBoxes();
</script>

</body>
</html>
