<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Create / View Boxes</title>

<style>
html{
    touch-action: manipulation;
}

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(111,66,193,0.16), transparent 35%),
        radial-gradient(circle at top right, rgba(0,123,255,0.10), transparent 35%),
        #0d0d0d;
    color:white;
    padding:18px;
    margin:0;
    overflow-x:hidden;
}

.page{
    max-width:850px;
    margin:0 auto;
}

.panel{
    background:linear-gradient(180deg, #1d1d1d, #151515);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

h1{
    text-align:center;
    font-size:34px;
    margin:12px 0 6px 0;
}

h2{
    margin:26px 0 12px 0;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin:0 0 24px 0;
    font-size:15px;
}

.form-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    margin-bottom:16px;
}

.input-label{
    text-align:left;
    color:#ddd;
    font-weight:bold;
    margin:14px 0 6px 2px;
    font-size:14px;
}

input,
select,
button,
textarea{
    width:100%;
    padding:14px;
    margin:6px 0 12px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
}

input,
select,
textarea{
    background:#2a2a2a;
    color:white;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.create-button{
    background:linear-gradient(135deg, #6f42c1, #56329b);
    border:1px solid rgba(111,66,193,0.45);
    box-shadow:0 10px 30px rgba(111,66,193,0.18);
}

.delete-button{
    background:linear-gradient(135deg, #dc3545, #a92735);
    margin-top:12px;
}

.box-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
    margin-top:12px;
}

.box-card{
    background:linear-gradient(145deg, #242424, #191919);
    border:1px solid rgba(255,255,255,0.08);
    padding:16px;
    border-radius:16px;
    text-align:left;
}

.box-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:10px;
}

.box-name{
    font-size:20px;
    font-weight:bold;
}

.box-icon{
    background:rgba(111,66,193,0.22);
    border:1px solid rgba(111,66,193,0.38);
    color:#c59cff;
    width:42px;
    height:42px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    flex-shrink:0;
}

.box-notes{
    background:#111;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:10px;
    padding:10px;
    color:#ddd;
    min-height:42px;
    line-height:1.35;
}

.empty-state{
    background:#2a2a2a;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:18px;
    color:#ccc;
    text-align:center;
}

.links-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    margin-top:16px;
}

.link-card{
    display:block;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg, rgba(0,123,255,0.28), rgba(0,123,255,0.08));
    border:1px solid rgba(0,123,255,0.35);
    padding:14px;
    border-radius:14px;
    font-weight:bold;
    text-align:center;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

@media(max-width:700px){
    h1{
        font-size:30px;
    }

    .panel{
        padding:18px;
    }

    .box-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="panel">

<h1>Create / View Boxes</h1>
<p class="subtitle">Create storage locations and keep notes for what each box contains</p>

<div class="form-card">

<div class="input-label">Box Name</div>
<input type="text" id="boxName" placeholder="Box name e.g. BOX-A1">

<div class="input-label">Notes</div>
<input type="text" id="notes" placeholder="Notes e.g. Hoodies / Shoes">

<button class="create-button" onclick="createBox()">Create Box</button>

</div>

<h2>Existing Boxes</h2>

<div id="boxList">
    <div class="empty-state">Loading boxes...</div>
</div>

<div class="links-grid">
    <a class="link-card" href="index.html">← Back to Dashboard</a>
</div>

</div>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function createBox(){
    const box =
    document.getElementById("boxName")
    .value
    .trim()
    .toUpperCase();

    const notes =
    document.getElementById("notes")
    .value
    .trim();

    if(!box){
        alert("Enter box name");
        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"CREATE_BOX",
            box:box,
            notes:notes
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(data.success){
            alert("Box created: " + data.box);

            document.getElementById("boxName").value = "";
            document.getElementById("notes").value = "";

            loadBoxes();
        }else{
            alert(data.error || "Could not create box");
        }
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        alert("Error creating box");
    });
}

function loadBoxes(){
    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"GET_BOXES"
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(!data.success){
            document.getElementById("boxList").innerHTML =
            "<div class='empty-state'>Could not load boxes</div>";
            return;
        }

        if(data.boxes.length === 0){
            document.getElementById("boxList").innerHTML =
            "<div class='empty-state'>No boxes created yet.</div>";
            return;
        }

        let html = "<div class='box-grid'>";

        data.boxes.forEach(item=>{
            html += `
                <div class="box-card">

                    <div class="box-title">
                        <div class="box-name">${item.box}</div>
                        <div class="box-icon">▱</div>
                    </div>

                    <div class="box-notes">
                        ${item.notes || "No notes added"}
                    </div>

                    <button
                    class="delete-button"
                    onclick="deleteBox('${item.box}')">
                    Delete Box
                    </button>

                </div>
            `;
        });

        html += "</div>";

        document.getElementById("boxList").innerHTML = html;
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        document.getElementById("boxList").innerHTML =
        "<div class='empty-state'>Error loading boxes</div>";
    });
}

function deleteBox(box){
    if(!confirm("Delete " + box + "? This only works if the box has no stock.")){
        return;
    }

    showLoading();

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"DELETE_BOX",
            box:box
        })
    })

    .then(res=>res.json())

    .then(data=>{
        hideLoading();

        if(data.success){
            alert("Box deleted: " + data.box);
            loadBoxes();
        }else{
            alert(data.error || "Could not delete box");
        }
    })

    .catch(error=>{
        hideLoading();

        console.error(error);

        alert("Error deleting box");
    });
}

loadBoxes();
</script>

</body>
</html>
