<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Remove Stock</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#d9534f;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#4CAF50;
}

.stop-button{
    background:#d9534f;
}

.torch-button{
    background:#f0ad4e;
    color:black;
}

.location-button{
    background:#0275d8;
}

.remove-button{
    background:#d9534f;
}

.toggle-box{
    background:#2a2a2a;
    padding:12px;
    margin:10px auto;
    border-radius:8px;
    width:90%;
    box-sizing:border-box;
    text-align:left;
}

.toggle-box label{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:15px;
}

.toggle-box input{
    width:auto;
    margin:0;
}

.helper-text{
    font-size:13px;
    color:#ccc;
    margin-top:8px;
    line-height:1.4;
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:10px;
}

#result{
    margin-top:15px;
    font-weight:bold;
}

#locationChoices{
    margin-top:15px;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<h1>Remove Stock</h1>

<input type="text" id="barcode" placeholder="Scan or Enter Barcode">

<input type="number" id="qty" placeholder="Quantity" value="1" min="1">

<input type="number" id="saleAmount" placeholder="Sale amount £" step="0.01" min="0">

<div class="toggle-box">
    <label>
        <input type="checkbox" id="oneSalesRow">
        Bundle sale: only add one row to sales tracker
    </label>
    <div class="helper-text">
        Unticked = qty 3 creates 3 sales rows.<br>
        Ticked = qty 3 removes 3 stock but creates 1 sales row.
    </div>
</div>

<button class="scan-button" onclick="startScanner()">Start Scanner</button>

<button class="torch-button" onclick="toggleTorch()">Toggle Flashlight</button>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<video id="reader" playsinline></video>

<button class="remove-button" onclick="removeStock(window.quickSaleLocation || '')">Remove Stock</button>

<div id="locationChoices"></div>

<p id="result"></p>

<p style="margin-top:20px;">
<a href="index.html">← Back to Dashboard</a>
</p>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let codeReader = null;
let controls = null;
let torchOn = false;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function beep(){
    try{
        const audioCtx =
        new (window.AudioContext || window.webkitAudioContext)();

        const oscillator =
        audioCtx.createOscillator();

        const gain =
        audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = 900;

        gain.gain.value = 0.15;

        oscillator.connect(gain);
        gain.connect(audioCtx.destination);

        oscillator.start();

        setTimeout(function(){
            oscillator.stop();
            audioCtx.close();
        }, 120);

    }catch(error){
        console.log("Beep not supported");
    }
}

function scanFeedback(){

    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    beep();

}

async function toggleTorch(){

    try{

        const video =
        document.getElementById("reader");

        if(!video.srcObject){
            alert("Start scanner first");
            return;
        }

        const track =
        video.srcObject.getVideoTracks()[0];

        torchOn = !torchOn;

        await track.applyConstraints({
            advanced:[{
                torch: torchOn
            }]
        });

        document.getElementById("result")
        .innerText =
        torchOn ? "Flashlight on" : "Flashlight off";

    }catch(error){

        alert("Flashlight not supported on this device/browser");

    }

}

function startScanner(){

    const video =
    document.getElementById("reader");

    video.style.display = "block";

    video.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    codeReader =
    new ZXingBrowser.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(
        null,
        "reader",
        function(result, error, ctrl){

            if(ctrl){
                controls = ctrl;
            }

            if(result){

                const barcode =
                result
                .getText()
                .trim()
                .toUpperCase();

                scanFeedback();

                document.getElementById("barcode")
                .value = barcode;

                document.getElementById("result")
                .innerText =
                "Scanned successfully. Enter sale amount if needed, then press Remove Stock.";

                stopScanner();

            }

        }
    )
    .then(function(ctrl){

        controls = ctrl;

    })
    .catch(function(error){

        console.error(error);

        alert("Could not start scanner. Check camera permissions.");

        scannerStarted = false;

        video.style.display = "none";

    });

    scannerStarted = true;
}

function stopScanner(){

    if(controls){

        controls.stop();

        controls = null;

    }

    const video =
    document.getElementById("reader");

    if(video && video.srcObject){

        video.srcObject
        .getTracks()
        .forEach(track => track.stop());

        video.srcObject = null;

    }

    video.style.display = "none";

    scannerStarted = false;
    torchOn = false;
}

function removeStock(locationOverride = ""){

    const barcode =
    document.getElementById("barcode")
    .value
    .trim()
    .toUpperCase();

    const qty =
    document.getElementById("qty")
    .value || 1;

    const saleAmount =
    document.getElementById("saleAmount")
    .value;

    const oneSalesRow =
    document.getElementById("oneSalesRow")
    .checked;

    if(!barcode){

        alert("Enter or scan barcode");

        return;
    }

    document.getElementById("locationChoices")
    .innerHTML = "";

    showLoading();

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"REMOVE",
            barcode:barcode,
            qty:qty,
            location:locationOverride,
            saleAmount:saleAmount,
            oneSalesRow:oneSalesRow
        })
    })

    .then(res => res.json())

    .then(data => {

        hideLoading();

        if(data.needsLocation){

            let html =
            "<p>Select location to remove stock from:</p>";

            data.locations.forEach(loc => {

                html += `
                    <button
                    class="location-button"
                    onclick="removeStock('${loc.location}')">
                    ${loc.location} (Qty: ${loc.qty})
                    </button>
                `;

            });

            document.getElementById("locationChoices")
            .innerHTML = html;

            document.getElementById("result")
            .innerText =
            "Select a location.";

            return;
        }

        if(data.success){

            document.getElementById("result")
            .innerText =
            "Removed " +
            qty +
            " from " +
            barcode +
            " at " +
            data.location +
            ". Remaining there: " +
            data.remainingQty;

            document.getElementById("barcode").value = "";
            document.getElementById("qty").value = "1";
            document.getElementById("saleAmount").value = "";
            document.getElementById("oneSalesRow").checked = false;

            document.getElementById("locationChoices")
            .innerHTML = "";

        }else{

            document.getElementById("result")
            .innerText =
            data.error || "Remove failed";

        }

    })

    .catch(error => {

        hideLoading();

        console.error(error);

        alert("Error removing stock");

    });

}
    window.addEventListener("load", function(){
    const params = new URLSearchParams(window.location.search);

    const barcode = params.get("barcode");
    const location = params.get("location");

    if(barcode){
        document.getElementById("barcode").value = barcode.toUpperCase();
    }

    if(location){
        window.quickSaleLocation = location.toUpperCase();
    }
});
</script>

</body>
</html>
