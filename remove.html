<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Remove Stock</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:450px;
    margin:auto;
}

input, button{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
}

button{
    background:#d9534f;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#4CAF50;
}

a{
    color:#4CAF50;
    text-decoration:none;
}

#reader{
    width:300px;
    margin:20px auto;
    display:none;
}

#result{
    font-weight:bold;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h1>Remove Stock</h1>

<input type="text" id="barcode" placeholder="Scan / Enter Barcode">

<input type="number" id="qty" placeholder="Quantity" value="1">

<button class="scan-button" onclick="startScanner()">Start Camera Scanner</button>

<div id="reader"></div>

<button onclick="removeStock()">Remove Stock</button>

<p id="result"></p>

<p><a href="index.html">Back to Add Stock</a></p>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let scanner;

function startScanner(){

    document.getElementById("reader").style.display = "block";

    if(scannerStarted){
        return;
    }

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: {
                width: 250,
                height: 150
            }
        },
        function(decodedText){

            const cleanBarcode = decodedText.trim().toUpperCase();

            document.getElementById("barcode").value = cleanBarcode;

            document.getElementById("result").innerText =
            "Scanned: " + cleanBarcode;

            stopScanner();

            removeStock();
        },
        function(errorMessage){
            // scanning errors ignored
        }
    );

    scannerStarted = true;
}

function stopScanner(){

    if(scannerStarted && scanner){
        scanner.stop().then(() => {
            scanner.clear();
            document.getElementById("reader").style.display = "none";
            scannerStarted = false;
        });
    }
}

function removeStock(){

    const barcode = document.getElementById("barcode").value.trim().toUpperCase();
    const qty = document.getElementById("qty").value || 1;

    if(!barcode){
        alert("Enter or scan barcode");
        return;
    }

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"REMOVE",
            barcode:barcode,
            qty:qty
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){

            document.getElementById("result").innerText =
            "Removed " + qty + " from " + barcode +
            ". Remaining: " + data.remainingQty;

            document.getElementById("barcode").value = "";

        } else {

            document.getElementById("result").innerText =
            data.error || "Remove failed";

        }

    })
    .catch(error => {
        console.error(error);
        alert("Error removing stock");
    });
}
</script>

</body>
</html>
