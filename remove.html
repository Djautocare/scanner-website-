<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Remove Stock</title>

<script src="https://unpkg.com/@zxing/browser@latest"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#d9534f;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#4CAF50;
}

.stop-button{
    background:#d9534f;
}

.location-button{
    background:#0275d8;
}

#reader{
    max-width:320px;
    width:100%;
    min-height:240px;
    margin:20px auto;
    display:none;
    background:#000;
    border-radius:10px;
}

#result{
    margin-top:15px;
    font-weight:bold;
}

#locationChoices{
    margin-top:15px;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}

/* Loading overlay */
#loadingOverlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.loaderBox{
    text-align:center;
    color:white;
    font-weight:bold;
}

.spinner{
    width:55px;
    height:55px;
    border:6px solid #333;
    border-top:6px solid #4CAF50;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 15px auto;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">

<h1>Remove Stock</h1>

<input type="text" id="barcode" placeholder="Scan or Enter Barcode">

<input type="number" id="qty" placeholder="Quantity" value="1">

<button class="scan-button" onclick="startScanner()">Start Scanner</button>

<button class="stop-button" onclick="stopScanner()">Stop Scanner</button>

<video id="reader" playsinline></video>

<button onclick="removeStock()">Remove Stock</button>

<div id="locationChoices"></div>

<p id="result"></p>

<p style="margin-top:20px;">
<a href="index.html">← Back to Dashboard</a>
</p>

</div>

<div id="loadingOverlay">
    <div class="loaderBox">
        <div class="spinner"></div>
        <p>Working...</p>
    </div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let codeReader = null;
let controls = null;

function showLoading(){
    document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading(){
    document.getElementById("loadingOverlay").style.display = "none";
}

function startScanner(){

    const video =
    document.getElementById("reader");

    video.style.display = "block";

    video.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    codeReader =
    new ZXingBrowser.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(
        null,
        "reader",
        function(result, error, ctrl){

            if(ctrl){
                controls = ctrl;
            }

            if(result){

                const barcode =
                result
                .getText()
                .trim()
                .toUpperCase();

                document.getElementById("barcode")
                .value = barcode;

                document.getElementById("result")
                .innerText =
                "Scanned successfully. Press Remove Stock.";

                stopScanner();

            }

        }
    )
    .then(function(ctrl){

        controls = ctrl;

    })
    .catch(function(error){

        console.error(error);

        alert("Could not start scanner. Check camera permissions.");

        scannerStarted = false;

        video.style.display = "none";

    });

    scannerStarted = true;
}

function stopScanner(){

    if(controls){

        controls.stop();

        controls = null;

    }

    const video =
    document.getElementById("reader");

    if(video && video.srcObject){

        video.srcObject
        .getTracks()
        .forEach(track => track.stop());

        video.srcObject = null;

    }

    video.style.display = "none";

    scannerStarted = false;
}

function removeStock(locationOverride = ""){

    const barcode =
    document.getElementById("barcode")
    .value
    .trim()
    .toUpperCase();

    const qty =
    document.getElementById("qty")
    .value || 1;

    if(!barcode){

        alert("Enter or scan barcode");

        return;
    }

    document.getElementById("locationChoices")
    .innerHTML = "";

    showLoading();

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"REMOVE",
            barcode:barcode,
            qty:qty,
            location:locationOverride
        })
    })

    .then(res => res.json())

    .then(data => {

        hideLoading();

        if(data.needsLocation){

            let html =
            "<p>Select location to remove stock from:</p>";

            data.locations.forEach(loc => {

                html += `
                    <button
                    class="location-button"
                    onclick="removeStock('${loc.location}')">
                    ${loc.location} (Qty: ${loc.qty})
                    </button>
                `;

            });

            document.getElementById("locationChoices")
            .innerHTML = html;

            document.getElementById("result")
            .innerText =
            "Select a location.";

            return;
        }

        if(data.success){

            document.getElementById("result")
            .innerText =
            "Removed " +
            qty +
            " from " +
            barcode +
            " at " +
            data.location +
            ". Remaining there: " +
            data.remainingQty;

            document.getElementById("barcode").value = "";

            document.getElementById("locationChoices")
            .innerHTML = "";

        }else{

            document.getElementById("result")
            .innerText =
            data.error || "Remove failed";

        }

    })

    .catch(error => {

        hideLoading();

        console.error(error);

        alert("Error removing stock");

    });

}
</script>

</body>
</html>
