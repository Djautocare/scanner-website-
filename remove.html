<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Remove Stock</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
html{
    touch-action: manipulation;
}

body{
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
}

.box{
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

input,
select,
button,
textarea{
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    background:#d9534f;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.scan-button{
    background:#4CAF50;
}

.location-button{
    background:#0275d8;
}

#reader{
    max-width:300px;
    width:100%;
    min-height:220px;
    margin:20px auto;
    display:none;
}

#result{
    margin-top:15px;
    font-weight:bold;
}

#locationChoices{
    margin-top:15px;
}

a{
    color:#4CAF50;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>Remove Stock</h1>

<input type="text" id="barcode" placeholder="Scan or Enter Barcode">

<input type="number" id="qty" placeholder="Quantity" value="1">

<button class="scan-button" onclick="startScanner()">Start Camera Scanner</button>

<div id="reader"></div>

<button onclick="removeStock()">Remove Stock</button>

<div id="locationChoices"></div>

<p id="result"></p>

<p style="margin-top:20px;">
<a href="index.html">← Back to Dashboard</a>
</p>

</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbzJ8kEK_3oSFX6qrXO3rOUWusXzQo6WyV4TCi4z3CiClCw8Wy9_nPJo4GZDixR3KG_Tyg/exec";

let scannerStarted = false;
let scanner;

function startScanner(){

    const reader = document.getElementById("reader");

    reader.style.display = "block";

    reader.scrollIntoView({
        block:"nearest",
        behavior:"instant"
    });

    if(scannerStarted){
        return;
    }

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps:10,
            qrbox:{
                width:250,
                height:150
            }
        },
        function(decodedText){

            const barcode =
            decodedText
            .trim()
            .toUpperCase();

            document.getElementById("barcode").value =
            barcode;

            document.getElementById("result").innerText =
            "Scanned: " + barcode;

            stopScanner();

            removeStock();

        },
        function(errorMessage){}
    );

    scannerStarted = true;
}

function stopScanner(){

    if(scannerStarted && scanner){

        scanner.stop().then(() => {

            scanner.clear();

            document.getElementById("reader")
            .style.display = "none";

            scannerStarted = false;

        });

    }

}

function removeStock(locationOverride = ""){

    const barcode =
    document.getElementById("barcode")
    .value
    .trim()
    .toUpperCase();

    const qty =
    document.getElementById("qty")
    .value || 1;

    if(!barcode){

        alert("Enter or scan barcode");

        return;
    }

    document.getElementById("locationChoices")
    .innerHTML = "";

    fetch(API_URL, {
        method:"POST",
        body:JSON.stringify({
            action:"REMOVE",
            barcode:barcode,
            qty:qty,
            location:locationOverride
        })
    })

    .then(res => res.json())

    .then(data => {

        if(data.needsLocation){

            let html =
            "<p>Select location to remove stock from:</p>";

            data.locations.forEach(loc => {

                html += `
                    <button
                    class="location-button"
                    onclick="removeStock('${loc.location}')">
                    ${loc.location} (Qty: ${loc.qty})
                    </button>
                `;

            });

            document.getElementById("locationChoices")
            .innerHTML = html;

            return;
        }

        if(data.success){

            document.getElementById("result")
            .innerText =
            "Removed " +
            qty +
            " from " +
            barcode +
            " at " +
            data.location +
            ". Remaining there: " +
            data.remainingQty;

            document.getElementById("barcode").value = "";

            document.getElementById("locationChoices")
            .innerHTML = "";

        }else{

            document.getElementById("result")
            .innerText =
            data.error || "Remove failed";

        }

    })

    .catch(error => {

        console.error(error);

        alert("Error removing stock");

    });

}
</script>

</body>
</html>
