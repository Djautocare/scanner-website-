<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Reset Password - InventoryOS</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;background:linear-gradient(135deg,#050505,#151515,#24103a);color:white;padding:20px}.card{width:100%;max-width:430px;background:#17171f;border:1px solid rgba(142,68,255,.35);border-radius:22px;padding:30px}.logo{text-align:center;font-size:30px;font-weight:bold}.logo span{color:#8e44ff}input,button{width:100%;padding:14px;border-radius:12px;font-size:16px}input{margin-top:15px;background:#25252d;color:white;border:1px solid rgba(142,68,255,.35)}button{margin-top:18px;border:0;background:#8e44ff;color:white;font-weight:bold}.message{text-align:center;margin-top:18px}.success{color:#63d471}.error{color:#ff6b6b}</style></head><body><div class="card"><div class="logo">Inventory<span>OS</span></div><input id="password" type="password" placeholder="10+ chars, uppercase, lowercase and number"><input id="confirmPassword" type="password" placeholder="Repeat password"><button onclick="resetPassword()">Reset Password</button><div id="message" class="message"></div></div><script src="js/api.js"></script><script>const token=new URLSearchParams(location.search).get("token");function validate(v){if(v.length<10)return"Password must be at least 10 characters.";if(!/[a-z]/.test(v))return"Password must include a lowercase letter.";if(!/[A-Z]/.test(v))return"Password must include an uppercase letter.";if(!/[0-9]/.test(v))return"Password must include a number.";return""}async function resetPassword(){const password=document.getElementById("password").value,confirm=document.getElementById("confirmPassword").value,message=document.getElementById("message");message.className="message";if(!token){message.classList.add("error");message.textContent="Invalid password reset link.";return}const error=validate(password);if(error){message.classList.add("error");message.textContent=error;return}if(password!==confirm){message.classList.add("error");message.textContent="Passwords do not match.";return}const data=await InventoryAPI.request("/auth/reset-password",{method:"POST",body:JSON.stringify({token,password})});if(data.success){InventoryAPI.clearSession();message.classList.add("success");message.textContent="Password changed successfully. Redirecting...";setTimeout(()=>location.href="login.html",1800)}else{message.classList.add("error");message.textContent=data.error||"Could not reset password."}}</script></body></html>
