<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password - InventoryOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#050505,#151515,#24103a);
    color:white;
    padding:20px;
}

.card{
    width:100%;
    max-width:430px;
    background:#17171f;
    border:1px solid rgba(142,68,255,0.35);
    border-radius:22px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
}

.logo{
    font-size:30px;
    font-weight:bold;
    text-align:center;
}

.logo span{
    color:#8e44ff;
}

.subtitle{
    text-align:center;
    color:#bbb;
    margin:10px 0 28px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:12px;
    border:1px solid rgba(142,68,255,.35);
    background:#25252d;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#8e44ff;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#9f5cff;
}

.message{
    margin-top:18px;
    text-align:center;
    color:#ccc;
    min-height:22px;
}

.success{
    color:#63d471;
}

.error{
    color:#ff6b6b;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#b56cff;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
Inventory<span>OS</span>
</div>

<div class="subtitle">
Choose a new password
</div>

<label>New Password</label>
<input
    id="password"
    type="password"
    minlength="8"
    placeholder="Minimum 8 characters"
>

<label>Confirm Password</label>
<input
    id="confirmPassword"
    type="password"
    minlength="8"
    placeholder="Repeat password"
>

<button onclick="resetPassword()">
Reset Password
</button>

<div id="message" class="message"></div>

<a href="login.html" class="back">
Return to Login
</a>

</div>

<script>

const API_BASE="https://api.inventoryos.co.uk";

const params=new URLSearchParams(window.location.search);
const token=params.get("token");

async function resetPassword(){

    const password=document.getElementById("password").value;
    const confirm=document.getElementById("confirmPassword").value;
    const message=document.getElementById("message");

    message.className="message";

    if(!token){
        message.classList.add("error");
        message.textContent="Invalid password reset link.";
        return;
    }

    if(password.length<8){
        message.classList.add("error");
        message.textContent="Password must be at least 8 characters.";
        return;
    }

    if(password!==confirm){
        message.classList.add("error");
        message.textContent="Passwords do not match.";
        return;
    }

    try{

        const response=await fetch(API_BASE+"/auth/reset-password",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                token,
                password
            })

        });

        const result=await response.json();

        if(result.success){
            localStorage.removeItem("inventoryos_token");
localStorage.removeItem("inventoryos_user");

            message.classList.add("success");
            message.textContent="Password changed successfully. Redirecting...";

            setTimeout(()=>{
                window.location.href="login.html";
            },2500);
            

        }else{

            message.classList.add("error");
            message.textContent=result.error;

        }

    }catch(error){

        message.classList.add("error");
        message.textContent="Server error. Please try again.";

    }

}

</script>

</body>
</html>
