<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0d0d0d">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>InventoryOS Login</title>

<style>
html{touch-action:manipulation;}
*{box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:
        radial-gradient(circle at top left, rgba(142,68,255,0.24), transparent 34%),
        radial-gradient(circle at bottom right, rgba(181,108,255,0.14), transparent 36%),
        linear-gradient(135deg,#050505,#121212,#1b0b2b);
    color:white;
    padding:18px;
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.page{
    width:100%;
    max-width:460px;
}

.panel{
    background:rgba(23,23,31,0.96);
    border:1px solid rgba(142,68,255,0.35);
    padding:28px;
    border-radius:24px;
    box-shadow:0 24px 70px rgba(0,0,0,0.5);
}

.logo{
    text-align:center;
    font-size:34px;
    font-weight:900;
    margin:6px 0;
}

.logo span{
    color:#8e44ff;
}

.subtitle{
    text-align:center;
    color:#bdbdbd;
    margin:0 0 26px;
    font-size:14px;
}

.input-label{
    color:#ddd;
    font-weight:bold;
    margin:14px 0 7px 2px;
    font-size:14px;
}

input,button{
    width:100%;
    padding:15px;
    border-radius:14px;
    font-size:16px;
}

input{
    background:#25252d;
    color:white;
    outline:none;
    border:1px solid rgba(142,68,255,0.24);
}

button{
    margin-top:16px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border:none;
}

.primary-button{
    background:linear-gradient(135deg,#8e44ff,#b56cff);
    box-shadow:0 12px 34px rgba(142,68,255,0.25);
}

.secondary-button{
    background:linear-gradient(135deg,#343444,#24242e);
    border:1px solid rgba(142,68,255,0.35);
}

.forgot{
    display:block;
    text-align:center;
    margin-top:16px;
    color:#b56cff;
    text-decoration:none;
    font-size:14px;
}

.toggle{
    color:#bdbdbd;
    font-size:14px;
    text-align:center;
    margin-top:18px;
    cursor:pointer;
    text-decoration:underline;
}

.status{
    min-height:22px;
    font-size:13px;
    color:#aaa;
    margin-top:16px;
    text-align:center;
}

.error{color:#ff8a8a;}
.success{color:#63d471;}

.small-note{
    color:#777;
    font-size:12px;
    line-height:1.35;
    margin-top:18px;
    text-align:center;
}
</style>
</head>

<body>

<div class="page">
<div class="panel">

<div class="logo">Inventory<span>OS</span></div>
<p class="subtitle" id="subtitle">Login to your inventory system</p>

<div id="loginForm">
    <div class="input-label">Email</div>
    <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">

    <div class="input-label">Password</div>
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">

    <button class="primary-button" onclick="login()" type="button">Login</button>

    <a class="forgot" href="forgot-password.html">Forgot your password?</a>

    <div class="toggle" onclick="showRegister()">Need to create an account?</div>
</div>

<div id="registerForm" style="display:none;">
    <div class="input-label">Name</div>
    <input type="text" id="registerName" placeholder="Dylan" autocomplete="name">

    <div class="input-label">Email</div>
    <input type="email" id="registerEmail" placeholder="you@example.com" autocomplete="email">

    <div class="input-label">Password</div>
    <input type="password" id="registerPassword" placeholder="Minimum 8 characters" autocomplete="new-password">

    <button class="primary-button" onclick="register()" type="button">Create Account</button>

    <div class="toggle" onclick="showLogin()">Already have an account?</div>
</div>

<div class="status" id="status"></div>

<div class="small-note">
    Securely connected via InventoryOS Cloud API
</div>

</div>
</div>

<script src="js/api.js"></script>
<script>
function setStatus(message, type){
    const status = document.getElementById("status");
    status.className = "status " + (type || "");
    status.innerText = message || "";
}

function showRegister(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
    document.getElementById("subtitle").innerText = "Create your InventoryOS account";
    setStatus("");
}

function showLogin(){
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("subtitle").innerText = "Login to your inventory system";
    setStatus("");
}

async function login(){
    try{
        setStatus("Logging in...");

        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        const data = await InventoryAPI.login(email, password);

        if(!data.success){
            setStatus(data.error || "Login failed", "error");
            return;
        }

        InventoryAPI.saveSession(data.token, data.user);
        setStatus("Login successful. Redirecting...", "success");

        setTimeout(function(){
            window.location.href = "add.html";
        }, 600);

    }catch(error){
        console.error(error);
        setStatus("Could not connect to server", "error");
    }
}

async function register(){
    try{
        setStatus("Creating account...");

        const name = document.getElementById("registerName").value.trim();
        const email = document.getElementById("registerEmail").value.trim();
        const password = document.getElementById("registerPassword").value;

        const data = await InventoryAPI.register(name, email, password);

        if(!data.success){
            setStatus(data.error || "Registration failed", "error");
            return;
        }

        InventoryAPI.saveSession(data.token, data.user);
        setStatus("Account created. Redirecting...", "success");

        setTimeout(function(){
            window.location.href = "add.html";
        }, 600);

    }catch(error){
        console.error(error);
        setStatus("Could not connect to server", "error");
    }
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        if(document.getElementById("loginForm").style.display !== "none"){
            login();
        }else{
            register();
        }
    }
});

if(InventoryAPI.isLoggedIn()){
    window.location.href = "add.html";
}
</script>

</body>
</html>
